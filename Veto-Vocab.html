function wordDestroyed(wordIdx) {
  const fw = GS.fallingWords[wordIdx];
  if (!fw || fw.done) return;
  fw.done = true;

  fw.el.style.transition = 'opacity 0.4s, transform 0.4s';
  fw.el.style.opacity = '0';
  fw.el.style.transform = 'scale(1.3)';
  setTimeout(() => fw.el.remove(), 400);

  GS.wordsCompleted++;
  document.getElementById('hud-words').textContent = `${GS.wordsCompleted}/${GS.wordsTotal}`;

  GS.fallingWords.splice(wordIdx, 1);
  GS.activeWordIndex = -1;
  GS.activeCharIndex = 0;

  document.getElementById('current-word-display').textContent = '';
  document.getElementById('key-indicator').innerHTML = GS.fallingWords.length > 0 ? '⌨️ TYPE NEXT LETTER' : '⌨️ INCOMING...';

  autoSelectWord();
  checkLevelComplete();
}

function autoSelectWord() {
  if (GS.fallingWords.length === 0) { GS.activeWordIndex = -1; return; }
  // Pick lowest (most dangerous) word
  let lowestIdx = 0;
  for (let i = 1; i < GS.fallingWords.length; i++) {
    if (!GS.fallingWords[i].done && GS.fallingWords[i].y > GS.fallingWords[lowestIdx].y) lowestIdx = i;
  }
  setActiveWord(lowestIdx);
}

function setActiveWord(idx) {
  // Remove highlight from previous
  if (GS.activeWordIndex !== -1 && GS.fallingWords[GS.activeWordIndex]) {
    const old = GS.fallingWords[GS.activeWordIndex];
    old.el.querySelectorAll('.char').forEach(c => c.classList.remove('next-target'));
  }
  GS.activeWordIndex = idx;
  GS.activeCharIndex = GS.fallingWords[idx]?.charIndex || 0;

  const fw = GS.fallingWords[idx];
  if (!fw) return;
  const chars = fw.el.querySelectorAll('.char');
  if (chars[fw.charIndex]) chars[fw.charIndex].classList.add('next-target');
  document.getElementById('current-word-display').textContent =
    `TARGET: ${fw.word} [${fw.word[fw.charIndex]}]`;
  document.getElementById('key-indicator').innerHTML =
    `⌨️ PRESS <span style="color:var(--neon-yellow);font-size:1.2em">${fw.word[fw.charIndex]}</span>`;
}

function wrongKeyEffect() {
  if (GS.mode === 'nightmare') flashScreen();
  GS.combo = 0;
  updateCombo();
}

function updateCombo() {
  const el = document.getElementById('combo-display');
  el.textContent = `COMBO x${GS.combo}`;
  if (GS.combo > 0) {
    el.classList.add('boom');
    setTimeout(() => el.classList.remove('boom'), 300);
  }
}

function flashScreen() {
  const f = document.getElementById('nightmare-flash');
  f.classList.add('flash');
  setTimeout(() => f.classList.remove('flash'), 120);
}

function updateLivesHUD() {
  document.getElementById('hud-lives').textContent = '♥'.repeat(Math.max(0, GS.lives)) + '♡'.repeat(Math.max(0, 3 - GS.lives));
}

// ════════════════════════════════════════════════════════
//   LEVEL COMPLETE / GAME OVER
// ════════════════════════════════════════════════════════
function checkLevelComplete() {
  if (GS.wordsCompleted >= GS.wordsTotal && GS.wordsSpawned >= GS.wordsTotal && GS.fallingWords.every(fw => fw.done)) {
    if (GS.wordsCompleted >= GS.wordsTotal) triggerLevelComplete();
  }
}

function triggerLevelComplete() {
  if (!GS.isRunning) return;
  GS.isRunning = false;
  clearTimeout(GS.spawnTimer);
  cancelAnimationFrame(GS.gameLoop);

  saveScore();

  document.getElementById('oc-score').textContent = `SCORE: ${GS.score} PTS`;

  // Stars
  const maxPts = WORD_BANK[GS.level-1].reduce((a,w) => a + w.length, 0) * (GS.mode==='nightmare'?2:1);
  const pct = GS.score / maxPts;
  const stars = pct >= 0.9 ? '★★★' : pct >= 0.6 ? '★★☆' : '★☆☆';
  document.getElementById('oc-stars').textContent = stars;

  document.getElementById('overlay-levelcomplete').classList.remove('hidden');

  const nextBtn = document.getElementById('btn-next-level');
  if (GS.level >= 10) {
    nextBtn.textContent = 'ALL DONE! 🏆';
    nextBtn.onclick = () => { hideOverlay('overlay-levelcomplete'); triggerAllClear(); };
  } else {
    nextBtn.textContent = `NEXT LEVEL ▶`;
    nextBtn.onclick = () => {
      hideOverlay('overlay-levelcomplete');
      startLevel(GS.level + 1);
    };
  }
}

function triggerGameOver() {
  if (!GS.isRunning) return;
  GS.isRunning = false;
  clearTimeout(GS.spawnTimer);
  cancelAnimationFrame(GS.gameLoop);

  flashScreen();
  document.getElementById('go-score').textContent = `SCORE: ${GS.score} PTS`;
  document.getElementById('overlay-gameover').classList.remove('hidden');

  document.getElementById('btn-retry').onclick = () => {
    hideOverlay('overlay-gameover');
    startLevel(GS.level);
  };
}

function triggerAllClear() {
  document.getElementById('ac-score').textContent = `TOTAL SCORE: ${GS.score} PTS`;
  document.getElementById('overlay-allclear').classList.remove('hidden');
}

function startNightmareFromMenu() {
  hideOverlay('overlay-allclear');
  GS.mode = 'nightmare';
  showLevelSelect('nightmare');
}

//   SAVE & LEADERBOARD
// ════════════════════════════════════════════════════════
function saveScore() {
  const save = loadSave();

  // Determine player ID
  const id = GS.isGuest ? '__guest__' : (GS.playerData?.id || GS.playerData?.email || '__guest__');
  if (!save[id]) save[id] = { unlockedLevels:[1], scores:{}, name:'Guest', avatar:'' };

  if (!GS.isGuest && GS.playerData) {
    save[id].name = GS.playerData.name || GS.playerData.email || 'Player';
    save[id].avatar = GS.playerData.avatar || '';
    save[id].email = GS.playerData.email || '';
  }

  // Unlock next level
  const nextLvl = GS.level + 1;
  if (nextLvl <= 10 && !save[id].unlockedLevels.includes(nextLvl)) {
    save[id].unlockedLevels.push(nextLvl);
  }

  // Save score (keep best)
  if (!save[id].scores[GS.level]) save[id].scores[GS.level] = {};
  const modeKey = GS.mode === 'nightmare' ? 'nightmare' : 'normal';
  const prev = save[id].scores[GS.level][modeKey] || 0;
  if (GS.score > prev) save[id].scores[GS.level][modeKey] = GS.score;

  writeSave(save);

  if (GS.isGuest) {
    // Show auth prompt after a short delay
    setTimeout(() => {
      document.getElementById('ap-score').textContent = `${GS.score} PTS`;
      document.getElementById('auth-prompt').classList.remove('hidden');
    }, 1000);
  }

  updateMenuScore();
}

function showLeaderboard() {
  const save = loadSave();
  const rows = [];

  Object.entries(save).forEach(([id, data]) => {
    if (id === '__guest__') return;
    let totalNormal = 0, totalNightmare = 0, maxLevel = 0;
    Object.entries(data.scores || {}).forEach(([lvl, s]) => {
      totalNormal += s.normal || 0;
      totalNightmare += s.nightmare || 0;
      maxLevel = Math.max(maxLevel, parseInt(lvl));
    });
    rows.push({
      name: data.name || 'Player',
      avatar: data.avatar || '',
      totalNormal,
      totalNightmare,
      total: totalNormal + totalNightmare,
      maxLevel,
    });
  });

  rows.sort((a,b) => b.total - a.total);

  const tbody = document.getElementById('lb-body');
  tbody.innerHTML = '';

  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-dim);padding:30px;">No scores yet. Be the first!</td></tr>';
  } else {
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
      tr.innerHTML = `
        <td class="lb-rank">${medal}</td>
        <td class="lb-name">
          ${r.avatar ? `<img src="${r.avatar}" class="avatar-sm" onerror="this.style.display='none'">` : ''}
          ${escHtml(r.name)}
        </td>
        <td class="lb-score">${r.total}</td>
        <td style="color:var(--neon-cyan)">LVL ${r.maxLevel}</td>
        <td>
          ${r.totalNormal ? `<span class="lb-mode-n">N:${r.totalNormal}</span>` : ''}
          ${r.totalNightmare ? `<span class="lb-mode-nm"> ☠:${r.totalNightmare}</span>` : ''}
        </td>
      `;
      tbody.appendChild(tr);
    });
  }

  showScreen('screen-leaderboard');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showHowToPlay() {
  document.getElementById('overlay-howtoplay').classList.remove('hidden');
}
