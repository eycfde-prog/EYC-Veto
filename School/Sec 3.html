<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quiz Competition – Grade 3 Secondary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Rajdhani:wght@600;700&display=swap');
  :root{--bg:#0a0e1a;--surface:#111827;--card:#1a2235;--accent:#f59e0b;--accent2:#3b82f6;--accent3:#10b981;--danger:#ef4444;--success:#22c55e;--text:#e2e8f0;--muted:#64748b;--border:#1e293b;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.05) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .screen{display:none;position:relative;z-index:1;}
  .screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  /* WELCOME */
  .logo-area{text-align:center;margin-bottom:36px;}
  .badge{display:inline-block;background:linear-gradient(135deg,var(--accent),#f97316);color:#000;font-weight:900;font-size:11px;padding:4px 14px;border-radius:20px;letter-spacing:2px;margin-bottom:12px;font-family:'Rajdhani',sans-serif;}
  .logo-area h1{font-size:clamp(22px,4vw,40px);font-weight:900;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;}
  .logo-area p{color:var(--muted);margin-top:8px;font-size:13px;}
  .welcome-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:30px;width:100%;max-width:540px;box-shadow:0 25px 60px rgba(0,0,0,.5);}
  .section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-family:'Rajdhani',sans-serif;}
  .player-count-selector{display:flex;gap:10px;margin-bottom:20px;}
  .player-count-btn{flex:1;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;}
  .player-count-btn.active{border-color:var(--accent);background:rgba(245,158,11,.15);color:var(--accent);}
  .player-count-btn:hover{border-color:var(--accent);}
  .players-container{margin-bottom:20px;}
  .player-input-group{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
  .player-icon{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .p1{background:linear-gradient(135deg,#f59e0b,#f97316);}
  .p2{background:linear-gradient(135deg,#3b82f6,#8b5cf6);}
  .p3{background:linear-gradient(135deg,#10b981,#06b6d4);}
  .p4{background:linear-gradient(135deg,#ec4899,#f43f5e);}
  input[type=text]{flex:1;padding:11px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;transition:border-color .2s;outline:none;}
  input[type=text]:focus{border-color:var(--accent2);}
  input[type=text]::placeholder{color:var(--muted);}
  .qtype-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
  .qtype-btn{padding:13px 8px;border-radius:12px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
  .qtype-btn .qi{font-size:20px;display:block;margin-bottom:3px;}
  .qtype-btn.active{border-color:var(--accent3);background:rgba(16,185,129,.15);color:var(--accent3);}
  .qtype-btn:hover{border-color:var(--accent3);}
  .start-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),#f97316);border:none;border-radius:12px;color:#000;font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 8px 24px rgba(245,158,11,.35);}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(245,158,11,.5);}
  /* GAME */
  #gameScreen{padding:0;justify-content:flex-start;}
  .game-header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10;}
  .scores-bar{display:flex;gap:7px;flex:1;overflow-x:auto;}
  .player-score-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:5px 11px;white-space:nowrap;transition:all .3s;}
  .player-score-chip.active-player{border-color:var(--accent);background:rgba(245,158,11,.15);box-shadow:0 0 16px rgba(245,158,11,.3);}
  .chip-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .chip-name{font-size:13px;font-weight:700;}
  .chip-score{font-size:17px;font-weight:900;font-family:'Rajdhani',sans-serif;color:var(--accent);}
  .q-counter{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);white-space:nowrap;}
  .timer-circle{width:46px;height:46px;position:relative;flex-shrink:0;}
  .timer-circle svg{transform:rotate(-90deg);}
  .timer-track{fill:none;stroke:var(--border);stroke-width:4;}
  .timer-progress{fill:none;stroke:var(--accent3);stroke-width:4;stroke-linecap:round;stroke-dasharray:125.6;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .3s;}
  .timer-number{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;}
  .game-content{flex:1;width:100%;max-width:760px;margin:0 auto;padding:18px 16px 40px;}
  .turn-wrap{display:flex;justify-content:center;margin-bottom:14px;}
  .turn-banner{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:7px 18px;font-size:14px;font-weight:700;}
  .qtype-tag{display:inline-block;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:11px;background:rgba(59,130,246,.2);color:var(--accent2);border:1px solid rgba(59,130,246,.3);font-family:'Rajdhani',sans-serif;}
  /* Question box */
  .question-text{font-size:clamp(14px,2vw,17px);font-weight:600;line-height:1.8;margin-bottom:22px;direction:ltr;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;border-left:4px solid var(--accent2);}
  /* Dialogue: each line stacked */
  .question-text.dlg{font-family:'Rajdhani',sans-serif;font-size:clamp(14px,2vw,16px);line-height:2.1;padding:16px 20px;}
  .dlg-line{display:block;}
  .sp-a{font-weight:900;color:var(--accent);margin-right:4px;}
  .sp-b{font-weight:900;color:var(--accent2);margin-right:4px;}
  /* Options */
  .options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  @media(max-width:500px){.options-grid{grid-template-columns:1fr;}}
  .option-btn{padding:13px 15px;border-radius:12px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;direction:ltr;display:flex;align-items:center;gap:9px;}
  .opt-letter{width:27px;height:27px;border-radius:7px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0;color:var(--accent);font-family:'Rajdhani',sans-serif;border:1px solid var(--border);transition:all .2s;}
  .option-btn:hover:not(:disabled){border-color:var(--accent2);background:rgba(59,130,246,.1);transform:translateX(3px);}
  .option-btn:hover:not(:disabled) .opt-letter{background:var(--accent2);color:#fff;}
  .option-btn.correct{border-color:var(--success)!important;background:rgba(34,197,94,.2)!important;animation:cPulse .4s ease;}
  .option-btn.correct .opt-letter{background:var(--success);color:#fff;border-color:var(--success);}
  .option-btn.wrong{border-color:var(--danger)!important;background:rgba(239,68,68,.2)!important;animation:wShake .4s ease;}
  .option-btn.wrong .opt-letter{background:var(--danger);color:#fff;border-color:var(--danger);}
  .option-btn:disabled{cursor:default;}
  @keyframes cPulse{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
  @keyframes wShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .next-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent2),#8b5cf6);border:none;border-radius:12px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
  .next-btn:hover{opacity:.9;transform:translateY(-2px);}
  /* Feedback */
  .fb-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100;}
  .fb-msg{font-size:80px;animation:fbAnim .8s forwards;opacity:0;}
  @keyframes fbAnim{0%{opacity:0;transform:scale(.5) translateY(20px)}50%{opacity:1;transform:scale(1.2) translateY(-10px)}80%{opacity:1;transform:scale(1) translateY(0)}100%{opacity:0;transform:scale(.8) translateY(-30px)}}
  /* RESULTS */
  #resultsScreen{padding:30px 20px;}
  .res-title{font-size:clamp(26px,5vw,40px);font-weight:900;text-align:center;margin-bottom:5px;background:linear-gradient(135deg,var(--accent),#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .res-sub{color:var(--muted);text-align:center;margin-bottom:32px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
  .podium-area{display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:32px;width:100%;max-width:440px;}
  .podium-item{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
  .pod-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:5px;border:3px solid transparent;}
  .pod-name{font-size:12px;font-weight:700;margin-bottom:3px;}
  .pod-score{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:900;margin-bottom:5px;}
  .pod-block{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:24px;}
  .rank1 .pod-avatar{border-color:#fbbf24;}.rank1 .pod-block{background:linear-gradient(180deg,#fbbf24,#f59e0b);height:100px;}.rank1 .pod-score{color:#fbbf24;}
  .rank2 .pod-avatar{border-color:#94a3b8;}.rank2 .pod-block{background:linear-gradient(180deg,#94a3b8,#64748b);height:72px;}.rank2 .pod-score{color:#94a3b8;}
  .rank3 .pod-avatar{border-color:#cd7f32;}.rank3 .pod-block{background:linear-gradient(180deg,#cd7f32,#92400e);height:52px;}.rank3 .pod-score{color:#cd7f32;}
  .scores-list{width:100%;max-width:440px;margin-bottom:26px;}
  .score-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 15px;margin-bottom:8px;}
  .s-rank{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:900;width:26px;text-align:center;color:var(--muted);}
  .s-name{flex:1;font-weight:700;font-size:14px;}
  .s-pts{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:900;color:var(--accent);}
  .again-btn{padding:12px 34px;background:linear-gradient(135deg,var(--accent3),#06b6d4);border:none;border-radius:12px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px rgba(16,185,129,.35);}
  .again-btn:hover{transform:translateY(-2px);}
  /* FLASH */
  .flash-fab{position:fixed;bottom:20px;right:20px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#f97316);border:none;color:#000;font-size:20px;cursor:pointer;z-index:200;box-shadow:0 6px 20px rgba(245,158,11,.5);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
  .flash-fab:hover{transform:scale(1.1);}
  .flash-overlay{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column;}
  .flash-overlay.open{display:flex;}
  .flash-toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#111;flex-shrink:0;}
  .f-close{padding:7px 13px;background:var(--danger);border:none;border-radius:8px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:1px;}
  .f-clear{padding:7px 13px;background:var(--muted);border:none;border-radius:8px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;cursor:pointer;}
  .f-hint{color:var(--muted);font-size:12px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
  .flash-body{flex:1;position:relative;overflow:hidden;}
  .flash-textarea{position:absolute;inset:0;width:100%;height:100%;background:transparent;border:none;outline:none;color:#fff;font-size:clamp(36px,7vw,86px);font-family:'Cairo',sans-serif;font-weight:900;text-align:center;resize:none;padding:40px;text-shadow:0 0 28px rgba(245,158,11,.8);caret-color:var(--accent);}
  /* Confetti */
  .cp{position:fixed;top:-20px;z-index:400;animation:cFall linear forwards;border-radius:2px;}
  @keyframes cFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
  /* Slide */
  .q-slide{animation:slideIn .3s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<!-- WELCOME -->
<div id="welcomeScreen" class="screen active">
  <div class="logo-area">
    <div class="badge">ASPIRE ★ ENGLISH</div>
    <h1>English Quiz Competition<br>Grade 3 Secondary</h1>
    <p>The Count of Monte Cristo &mdash; Final Revision</p>
  </div>
  <div class="welcome-card">
    <div class="section-label">Number of Players</div>
    <div class="player-count-selector">
      <button class="player-count-btn active" onclick="setPC(1)">1</button>
      <button class="player-count-btn" onclick="setPC(2)">2</button>
      <button class="player-count-btn" onclick="setPC(3)">3</button>
      <button class="player-count-btn" onclick="setPC(4)">4</button>
    </div>
    <div class="section-label">Player Names</div>
    <div class="players-container" id="pContainer"></div>
    <div class="section-label">Question Type</div>
    <div class="qtype-grid">
      <button class="qtype-btn active" id="btn_vocab" onclick="setQt('vocab')"><span class="qi">📚</span>Vocabulary MCQ</button>
      <button class="qtype-btn" id="btn_grammar" onclick="setQt('grammar')"><span class="qi">📝</span>Grammar MCQ</button>
      <button class="qtype-btn" id="btn_bracketGrammar" onclick="setQt('bracketGrammar')"><span class="qi">🔡</span>Use the Brackets</button>
      <button class="qtype-btn" id="btn_dialogue" onclick="setQt('dialogue')"><span class="qi">💬</span>Dialogue</button>
    </div>
    <button class="start-btn" onclick="startGame()">🚀 Start Competition</button>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <div class="scores-bar" id="scoresBar"></div>
    <div class="q-counter" id="qCounter">1/50</div>
    <div class="timer-circle">
      <svg viewBox="0 0 44 44" width="46" height="46">
        <circle class="timer-track" cx="22" cy="22" r="20"/>
        <circle class="timer-progress" id="timerProg" cx="22" cy="22" r="20"/>
      </svg>
      <div class="timer-number" id="timerNum">45</div>
    </div>
  </div>
  <div class="game-content">
    <div class="turn-wrap">
      <div class="turn-banner" id="turnBanner">🎯 Player's Turn</div>
    </div>
    <div id="qSlide" class="q-slide">
      <div class="qtype-tag" id="qtTag">VOCABULARY</div>
      <div class="question-text" id="qText">Loading…</div>
      <div class="options-grid" id="optGrid"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQ()" style="display:none">Next Question →</button>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="resultsScreen" class="screen">
  <div class="res-title">🏆 Final Results</div>
  <div class="res-sub">WELL DONE EVERYONE!</div>
  <div class="podium-area" id="podium"></div>
  <div class="scores-list" id="scoresList"></div>
  <button class="again-btn" onclick="playAgain()">🔄 Play Again</button>
</div>

<!-- Feedback -->
<div class="fb-overlay"><div class="fb-msg" id="fbMsg"></div></div>

<!-- Flash FAB -->
<button class="flash-fab" onclick="openFlash()" title="Whiteboard">✏️</button>

<!-- Flash Screen -->
<div class="flash-overlay" id="flashOv">
  <div class="flash-toolbar">
    <button class="f-close" onclick="closeFlash()">✕ CLOSE</button>
    <button class="f-clear" onclick="clearFlash()">🗑 CLEAR</button>
    <span class="f-hint">WRITE IN BIG TEXT</span>
  </div>
  <div class="flash-body">
    <textarea class="flash-textarea" id="flashTA" placeholder="Type here…"></textarea>
  </div>
</div>

<script>
// ══════════════ DATA ══════════════
const vocabQ=[
  {q:"The nurse met many patients, each with a ………….., human story to tell.",o:["encouraging","heartbreaking","fascinating","heartwarming"],a:1},
  {q:"The Grand Egyptian Museum ……….. with tourists from all over the world.",o:["buzzes","slows","sneezes","fades"],a:0},
  {q:"After the earthquake, ………….. spread throughout the streets.",o:["chaos","peace","harmony","quiet"],a:0},
  {q:"Nurses often ……….. their day by reading updates on each patient's condition.",o:["plug in","turn off","kick off","kick out"],a:2},
  {q:"Many …………. couples have lived in the same house for decades.",o:["brotherly","orderly","newly","elderly"],a:3},
  {q:"The patient stopped taking his …………., and needed to be taken to hospital.",o:["medication","vacation","location","dedication"],a:0},
  {q:"The doctor just started her night …………, so she won't be home until morning.",o:["appointment","round","hesitation","shift"],a:3},
  {q:"She nursed her mother after the surgery. 'Nursed' can be replaced by ………",o:["cared for","looked for","ignored","neglected"],a:0},
  {q:"Nurses check the patients' ………… every morning before starting their rounds.",o:["charts","carts","folders","documents"],a:0},
  {q:"It took my brother months to ……..….. from the car accident.",o:["discover","recover","shiver","deliver"],a:1},
  {q:"During emergencies, doctors must divide their …………… between several patients.",o:["tension","intention","attention","prevention"],a:2},
  {q:"The patient's monitor ……..….. loudly when oxygen levels drop.",o:["beeps","whispers","groans","moans"],a:0},
  {q:"The hospital staff worked hard to make sure the shift …………… smoothly.",o:["walked","sat","leaned","ran"],a:3},
  {q:"After surgery, patients are connected to ………….. for continuous observation.",o:["stethoscope","monitors","fridges","lamps"],a:1},
  {q:"Students should ………….. understanding main ideas rather than memorizing details.",o:["interested in","depend","focus on","avoid"],a:2},
  {q:"After the accident, he remained without ………….. for several minutes.",o:["weakness","brightness","consciousness","darkness"],a:2},
  {q:"Training helps nurses react correctly when unexpected emergencies ………….",o:["raise","arise","arouse","rise"],a:1},
  {q:"The driver must ………….. sure the car is safe before starting the trip.",o:["find","do","have","make"],a:3},
  {q:"Despite the chaos outside, the teacher …………… calm and continued her work.",o:["remained","remind","memorize","maintained"],a:0},
  {q:"Doctors and nurses are trained to stay calm during …………….",o:["currencies","emergencies","frequencies","agencies"],a:1},
  {q:"Nurses have to ………….. every medication they give to patients.",o:["implement","score","comment","document"],a:3},
  {q:"He worked nonstop all week and finally ………….. from exhaustion.",o:["constructed","stretched","jumped","collapsed"],a:3},
  {q:"He finally felt ………… when he got the job he had always wanted.",o:["disappointed","fulfilled","stressed","unsatisfied"],a:1},
  {q:"He thanked the …………. for responding so fast and saving his father's life.",o:["paramedics","pharmacists","chemists","biologists"],a:0},
  {q:"We must take steps to ………….. the survival of rare animals.",o:["ensure","risk","threaten","endanger"],a:0},
  {q:"In sports, teamwork makes the dream …………., because no player can win alone.",o:["fulfil","work","achieve","collapse"],a:1},
  {q:"She became ………….. after taking care of her sick child all night.",o:["relaxed","refreshed","exhausted","energetic"],a:2},
  {q:"If a patient's condition changes, the nurse must quickly …………… into action.",o:["spring","ring","crawl","start"],a:0},
  {q:"They decided to trade their small flat …………. a bigger one in the countryside.",o:["in","on","with","for"],a:3},
  {q:"Many ………… of natural disasters lose their families and homes.",o:["criminals","volunteers","victims","rescuers"],a:2},
  {q:"The couple's relationship is a ……………—they're happy one day and arguing the next.",o:["rollercoaster","routine","cycle","journey"],a:0},
  {q:"After running, he put his hands on his ………… and tried to breathe slowly.",o:["chess","chest","chase","cheat"],a:1},
  {q:"Helping others gives us a ……………. feeling as it brings us joy and inner peace.",o:["frustrating","exhausting","stressful","rewarding"],a:3},
  {q:"The nurse checked the patient's ……………. before giving medication.",o:["pulse","plus","blood","weight"],a:0},

  {lines:["A: The surgery took over six hours.","B: ____________","A: Yes, it was a very complex case."],o:["That's quite short actually.","Really? The surgeon must have been under enormous pressure.","The surgeon was probably bored.","Six hours is too long for any surgery."],a:1},

// ══════════════ STATE ══════════════
let players=[], qt='vocab', curQs=[], qIdx=0, pIdx=0, timer=null, tLeft=45, answered=false;
const TOTAL=45, CIRC=125.6;
const pColors=[
  {bg:'linear-gradient(135deg,#f59e0b,#f97316)',tx:'#000'},
  {bg:'linear-gradient(135deg,#3b82f6,#8b5cf6)',tx:'#fff'},
  {bg:'linear-gradient(135deg,#10b981,#06b6d4)',tx:'#fff'},
  {bg:'linear-gradient(135deg,#ec4899,#f43f5e)',tx:'#fff'},
];
const emojis=['🥇','🥈','🥉','🎯'];

// ══════════════ WELCOME ══════════════
let nPlayers=1;
function setPC(n){nPlayers=n;document.querySelectorAll('.player-count-btn').forEach((b,i)=>b.classList.toggle('active',i+1===n));renderInputs();}
function renderInputs(){
  const c=document.getElementById('pContainer'),cls=['p1','p2','p3','p4'];c.innerHTML='';
  for(let i=0;i<nPlayers;i++)c.innerHTML+=`<div class="player-input-group"><div class="player-icon ${cls[i]}">${emojis[i]}</div><input type="text" id="p${i+1}" placeholder="Player ${i+1} name"></div>`;
}
function setQt(t){qt=t;document.querySelectorAll('.qtype-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn_'+t).classList.add('active');}
function startGame(){
  players=[];
  for(let i=0;i<nPlayers;i++){const v=document.getElementById('p'+(i+1))?.value.trim();players.push({name:v||'Player '+(i+1),score:0,color:pColors[i]});}
  const pool=qt==='vocab'?vocabQ:qt==='grammar'?grammarQ:qt==='bracketGrammar'?bracketQ:dialogueQ;
  curQs=shuffle([...pool]).slice(0,50);qIdx=0;pIdx=0;
  show('gameScreen');renderBar();loadQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ══════════════ GAME ══════════════
function renderBar(){
  document.getElementById('scoresBar').innerHTML=players.map((p,i)=>`
    <div class="player-score-chip ${i===pIdx?'active-player':''}" id="chip${i}">
      <div class="chip-avatar" style="background:${p.color.bg};color:${p.color.tx}">${emojis[i]}</div>
      <span class="chip-name">${p.name}</span>
      <span class="chip-score" id="sc${i}">${p.score}</span>
    </div>`).join('');
}
function loadQ(){
  if(qIdx>=curQs.length){showResults();return;}
  answered=false;
  const q=curQs[qIdx],p=players[pIdx];
  document.getElementById('qCounter').textContent=`${qIdx+1}/${curQs.length}`;
  document.getElementById('turnBanner').innerHTML=`<span style="background:${p.color.bg};-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${emojis[pIdx]}</span>&nbsp;${p.name}'s Turn`;
  const tags={vocab:'📚 VOCABULARY',grammar:'📝 GRAMMAR',bracketGrammar:'🔡 USE THE BRACKETS',dialogue:'💬 DIALOGUE'};
  document.getElementById('qtTag').textContent=tags[qt];
  // Question box
  const qBox=document.getElementById('qText');
  if(qt==='dialogue'&&q.lines){
    qBox.className='question-text dlg';
    qBox.innerHTML=q.lines.map(line=>{
      return `<span class="dlg-line">${line.replace(/^A:/,'<span class="sp-a">A:</span>').replace(/^B:/,'<span class="sp-b">B:</span>')}</span>`;
    }).join('');
  } else {
    qBox.className='question-text';
    qBox.textContent=q.q;
  }
  // Options
  const letters=['A','B','C','D'];
  document.getElementById('optGrid').innerHTML=q.o.map((o,i)=>`
    <button class="option-btn" id="opt${i}" onclick="pick(${i})">
      <span class="opt-letter">${letters[i]}</span>${o}
    </button>`).join('');
  document.getElementById('nextBtn').style.display='none';
  // Animate
  const s=document.getElementById('qSlide');s.classList.remove('q-slide');void s.offsetWidth;s.classList.add('q-slide');
  renderBar();startTimer();
}
function pick(i){
  if(answered)return;answered=true;clearInterval(timer);
  const q=curQs[qIdx];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  document.getElementById('opt'+q.a).classList.add('correct');
  if(i===q.a){
    players[pIdx].score++;
    document.getElementById('sc'+pIdx).textContent=players[pIdx].score;
    showFb('✅');
  } else {
    document.getElementById('opt'+i).classList.add('wrong');
    // Score unchanged — wrong answers don't affect score at all
    showFb('❌');
  }
  // Always show Next button — no auto-advance
  document.getElementById('nextBtn').style.display='block';
}
function nextQ(){qIdx++;pIdx=(pIdx+1)%players.length;loadQ();}
function startTimer(){
  tLeft=TOTAL;updateTimer();clearInterval(timer);
  timer=setInterval(()=>{
    tLeft--;updateTimer();
    if(tLeft<=0){
      clearInterval(timer);
      if(!answered){
        answered=true;
        const q=curQs[qIdx];
        document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
        document.getElementById('opt'+q.a).classList.add('correct');
        showFb('⏰');
        document.getElementById('nextBtn').style.display='block';
      }
    }
  },1000);
}
function updateTimer(){
  document.getElementById('timerNum').textContent=tLeft;
  const p=document.getElementById('timerProg');
  p.style.strokeDashoffset=CIRC-(tLeft/TOTAL)*CIRC;
  if(tLeft<=10){p.style.stroke='#ef4444';document.getElementById('timerNum').style.color='#ef4444';}
  else if(tLeft<=20){p.style.stroke='#f59e0b';document.getElementById('timerNum').style.color='#f59e0b';}
  else{p.style.stroke='#10b981';document.getElementById('timerNum').style.color='#e2e8f0';}
}
function showFb(e){const m=document.getElementById('fbMsg');m.textContent=e;m.style.animation='none';void m.offsetWidth;m.style.animation='fbAnim .8s forwards';}

// ══════════════ RESULTS ══════════════
function showResults(){
  clearInterval(timer);show('resultsScreen');confetti();
  const s=[...players].sort((a,b)=>b.score-a.score);
  document.getElementById('scoresList').innerHTML=s.map((p,i)=>{
    const oi=players.indexOf(p);
    return `<div class="score-row"><div class="s-rank">${i+1}</div>
      <div class="chip-avatar" style="background:${p.color.bg};color:${p.color.tx};width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">${emojis[oi]}</div>
      <div class="s-name">${p.name}</div><div class="s-pts">${p.score} pts</div></div>`;
  }).join('');
  if(s.length>=2){
    const ord=s.length>=3?[s[1],s[0],s[2]]:[null,s[0],s[1]];
    const ranks=['rank2','rank1','rank3'],hs=[72,100,52],m=['🥈','🥇','🥉'];
    document.getElementById('podium').innerHTML=ord.map((p,i)=>{
      if(!p)return'<div class="podium-item"></div>';
      const oi=players.indexOf(p);
      return `<div class="podium-item ${ranks[i]}"><div class="pod-avatar" style="background:${p.color.bg}">${emojis[oi]}</div>
        <div class="pod-name">${p.name}</div><div class="pod-score">${p.score}</div>
        <div class="pod-block" style="height:${hs[i]}px">${m[i]}</div></div>`;
    }).join('');
  } else document.getElementById('podium').style.display='none';
}
function confetti(){
  const c=['#f59e0b','#3b82f6','#10b981','#ec4899','#f97316','#8b5cf6'];
  for(let i=0;i<80;i++){
    const e=document.createElement('div');e.className='cp';
    e.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),4000);
  }
}
function playAgain(){show('welcomeScreen');}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ══════════════ FLASH ══════════════
function openFlash(){document.getElementById('flashOv').classList.add('open');document.getElementById('flashTA').focus();}
function closeFlash(){document.getElementById('flashOv').classList.remove('open');}
function clearFlash(){document.getElementById('flashTA').value='';}

renderInputs();
</script>
</body>
</html>
