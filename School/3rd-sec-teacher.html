<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>VETO PRO — Presentation Mode</title>
    <!-- استدعاء ملف البيانات الخاص بك -->
    <script src="questionBank.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap');

        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #3fb950; /* Veto Green */
            --text: #e6edf3;
            --mu: #7d8590;
            --gold: #e3b341;
            --blue: #58a6ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden; /* منع التمرير لتركيز العرض */
            display: flex;
            flex-direction: column;
        }

        /* خلفية سينمائية */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(63, 185, 80, 0.05), transparent);
            pointer-events: none;
        }

        /* شريط التحكم العلوي - بسيط جداً لا يشتت */
        .v-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            background: rgba(13, 17, 23, 0.8);
        }

        .v-logo { font-weight: 900; font-size: 1.5rem; color: var(--accent); letter-spacing: 2px; }
        .v-status { font-family: 'Rajdhani'; color: var(--mu); font-size: 1.2rem; }

        /* منطقة العرض الرئيسية */
        .v-stage {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .slide-container {
            width: 100%;
            max-width: 1200px;
            animation: fadeIn 0.5s ease;
        }

        /* السؤال - حجم ضخم للرؤية من بعيد */
        .q-text {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 50px;
            text-align: center;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* شبكة الاختيارات */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .opt-card {
            background: var(--card-bg);
            border: 2px solid #30363d;
            border-radius: 15px;
            padding: 25px;
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .opt-letter {
            background: #21262d;
            color: var(--blue);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-family: 'Rajdhani';
            font-weight: 900;
        }

        /* حالة الإجابة الصحيحة عند التفعيل */
        .opt-card.correct.show-action {
            border-color: var(--accent);
            background: rgba(63, 185, 80, 0.1);
            box-shadow: 0 0 30px rgba(63, 185, 80, 0.2);
            transform: scale(1.02);
        }

        .opt-card.correct.show-action .opt-letter {
            background: var(--accent);
            color: #000;
        }

        /* شريط التحكم السفلي */
        .v-footer {
            padding: 20px 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            background: #0d1117;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 10px;
            border: none;
            font-family: 'Rajdhani';
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-main { background: var(--blue); color: #fff; }
        .btn-action { background: var(--accent); color: #000; flex: 1; font-size: 1.5rem; }
        .btn-nav { background: #21262d; color: #fff; border: 1px solid #30363d; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive للأحجام المتوسطة */
        @media (max-width: 900px) {
            .options-grid { grid-template-columns: 1fr; }
            .q-text { font-size: 2rem; }
            .opt-card { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="v-header">
    <div class="v-logo">VETO PRO</div>
    <div class="v-status" id="slideInfo">Slide 0 / 0</div>
    <div style="display:flex; gap:10px;">
        <select id="sectionSelect" onchange="changeSection(this.value)" style="background:#161b22; color:#fff; border:1px solid #30363d; padding:5px 10px; border-radius:5px;">
            <!-- سيتم ملؤه بواسطة JS -->
        </select>
    </div>
</div>

<div class="v-stage" id="stage">
    <!-- السلايد سيظهر هنا -->
</div>

<div class="v-footer">
    <button class="btn btn-nav" onclick="prevSlide()">❮ Previous</button>
    <button class="btn btn-action" onclick="revealAnswer()">SHOW ANSWER (Space)</button>
    <button class="btn btn-nav" onclick="nextSlide()">Next ❯</button>
</div>

<script>
    let currentData = [];
    let currentIndex = 0;
    let isRevealed = false;

    // 1. تهيئة البيانات
    document.addEventListener('DOMContentLoaded', () => {
        // ملء القائمة بالأقسام المتاحة في QB
        const select = document.getElementById('sectionSelect');
        Object.keys(QB.meta).forEach(key => {
            let opt = document.createElement('option');
            opt.value = key;
            opt.innerText = QB.meta[key].label;
            select.appendChild(opt);
        });

        // تشغيل أول قسم تلقائياً
        changeSection(Object.keys(QB.meta)[0]);
    });

    function changeSection(sec) {
        currentData = QB[sec] || [];
        currentIndex = 0;
        isRevealed = false;
        renderSlide();
    }

    // 2. رندر السلايد
    function renderSlide() {
        const stage = document.getElementById('stage');
        const q = currentData[currentIndex];
        
        if (!q) {
            stage.innerHTML = "<h1>No Questions Found</h1>";
            return;
        }

        isRevealed = false;
        document.getElementById('slideInfo').innerText = `Question ${currentIndex + 1} / ${currentData.length}`;

        let html = `
            <div class="slide-container">
                ${q.passage ? `<div style="font-size:1.2rem; color:var(--mu); text-align:center; margin-bottom:20px; font-style:italic;">${q.passage}</div>` : ''}
                <div class="q-text">${q.q || q.question}</div>
                <div class="options-grid">
        `;

        const letters = ['A', 'B', 'C', 'D'];
        q.o.forEach((opt, idx) => {
            html += `
                <div class="opt-card ${idx === q.a ? 'correct' : ''}" onclick="revealAnswer()">
                    <div class="opt-letter">${letters[idx]}</div>
                    <div class="opt-val">${opt}</div>
                </div>
            `;
        });

        html += `</div></div>`;
        stage.innerHTML = html;
    }

    // 3. الأكشن (إظهار الإجابة)
    function revealAnswer() {
        isRevealed = true;
        document.querySelectorAll('.opt-card.correct').forEach(el => {
            el.classList.add('show-action');
        });
    }

    // 4. التنقل
    function nextSlide() {
        if (currentIndex < currentData.length - 1) {
            currentIndex++;
            renderSlide();
        }
    }

    function prevSlide() {
        if (currentIndex > 0) {
            currentIndex--;
            renderSlide();
        }
    }

    // 5. اختصارات الكيبورد (The Educator's Magic)
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            e.preventDefault();
            revealAnswer();
        } else if (e.code === 'ArrowRight' || e.code === 'Enter') {
            nextSlide();
        } else if (e.code === 'ArrowLeft') {
            prevSlide();
        }
    });
</script>

</body>
</html>
