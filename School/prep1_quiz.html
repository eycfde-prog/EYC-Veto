<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quiz – Prep 1 | New Vision School</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Rajdhani:wght@600;700&display=swap');
:root{
  --bg:#0d1117;--surface:#161b22;--card:#1c2333;--border:#21262d;
  --green:#2ea043;--green2:#3fb950;--blue:#58a6ff;--purple:#bc8cff;
  --orange:#f0883e;--red:#f85149;--yellow:#e3b341;
  --text:#e6edf3;--muted:#7d8590;--dim:#484f58;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(46,160,67,.12),transparent),
             radial-gradient(ellipse 60% 40% at 80% 80%,rgba(88,166,255,.08),transparent);
  pointer-events:none;z-index:0;}

/* ── SCREENS ── */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
#gameScreen,#poetryScreen{justify-content:flex-start;padding:0;}
#poetryScreen .inner{width:100%;max-width:820px;margin:0 auto;padding:20px 16px 60px;}

/* ── WELCOME ── */
.logo{text-align:center;margin-bottom:32px;}
.logo .pill{display:inline-block;background:linear-gradient(135deg,var(--green),#56d364);color:#000;font-weight:900;font-size:11px;padding:4px 14px;border-radius:20px;letter-spacing:2px;margin-bottom:12px;font-family:'Rajdhani',sans-serif;}
.logo h1{font-size:clamp(20px,4vw,38px);font-weight:900;background:linear-gradient(135deg,#fff,var(--green2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;}
.logo p{color:var(--muted);margin-top:6px;font-size:13px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.slabel{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;font-family:'Rajdhani',sans-serif;}

/* player count */
.pc-row{display:flex;gap:8px;margin-bottom:18px;}
.pc-btn{flex:1;padding:11px;border-radius:9px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;}
.pc-btn.active{border-color:var(--green);background:rgba(46,160,67,.15);color:var(--green2);}
.pc-btn:hover{border-color:var(--green);}

/* player inputs */
.pi-group{display:flex;align-items:center;gap:9px;margin-bottom:9px;}
.pi-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.c0{background:linear-gradient(135deg,#f0883e,#f85149);}
.c1{background:linear-gradient(135deg,#58a6ff,#bc8cff);}
.c2{background:linear-gradient(135deg,#3fb950,#26a641);}
.c3{background:linear-gradient(135deg,#e3b341,#f0883e);}
input[type=text]{flex:1;padding:10px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;transition:border-color .2s;}
input[type=text]:focus{border-color:var(--blue);}
input[type=text]::placeholder{color:var(--muted);}

/* qtype grid */
.qt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:22px;}
.qt-btn{padding:12px 8px;border-radius:11px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;}
.qt-btn .qi{font-size:19px;display:block;margin-bottom:3px;}
.qt-btn.active{border-color:var(--blue);background:rgba(88,166,255,.12);color:var(--blue);}
.qt-btn:hover{border-color:var(--blue);}
/* poetry mode btn - special */
.qt-btn.poetry-mode{border-color:var(--purple);}
.qt-btn.poetry-mode.active{background:rgba(188,140,255,.12);color:var(--purple);}
.qt-btn.poetry-mode:hover{border-color:var(--purple);}

.start-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#26a641);border:none;border-radius:11px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 6px 20px rgba(46,160,67,.35);}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(46,160,67,.5);}

/* ── GAME HEADER ── */
.game-header{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:11px;position:sticky;top:0;z-index:10;}
.sbar{display:flex;gap:6px;flex:1;overflow-x:auto;}
.chip{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:4px 10px;white-space:nowrap;transition:all .3s;}
.chip.active{border-color:var(--green);background:rgba(46,160,67,.15);box-shadow:0 0 14px rgba(46,160,67,.25);}
.ch-av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;}
.ch-name{font-size:12px;font-weight:700;}
.ch-sc{font-size:16px;font-weight:900;font-family:'Rajdhani',sans-serif;color:var(--green2);}
.q-ctr{font-family:'Rajdhani',sans-serif;font-size:12px;color:var(--muted);white-space:nowrap;}
.tcircle{width:44px;height:44px;position:relative;flex-shrink:0;}
.tcircle svg{transform:rotate(-90deg);}
.t-track{fill:none;stroke:var(--border);stroke-width:4;}
.t-prog{fill:none;stroke:var(--green2);stroke-width:4;stroke-linecap:round;stroke-dasharray:125.6;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear,stroke .3s;}
.t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:700;}

/* ── GAME CONTENT ── */
.game-content{flex:1;width:100%;max-width:760px;margin:0 auto;padding:16px 14px 40px;}
.turn-wrap{display:flex;justify-content:center;margin-bottom:12px;}
.turn-banner{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:30px;padding:6px 16px;font-size:13px;font-weight:700;}
.qtag{display:inline-block;padding:2px 11px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:10px;background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.25);font-family:'Rajdhani',sans-serif;}
.qbox{font-size:clamp(13px,1.9vw,16px);font-weight:600;line-height:1.85;margin-bottom:20px;direction:ltr;text-align:left;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px 18px;border-left:4px solid var(--blue);}
.qbox.dlg{font-family:'Rajdhani',sans-serif;font-size:clamp(13px,1.8vw,15px);line-height:2.1;}
.dlg-line{display:block;}
.spa{font-weight:900;color:var(--orange);margin-right:3px;}
.spb{font-weight:900;color:var(--blue);margin-right:3px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
@media(max-width:480px){.opts{grid-template-columns:1fr;}}
.opt{padding:12px 14px;border-radius:11px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;direction:ltr;display:flex;align-items:center;gap:8px;}
.opt-l{width:26px;height:26px;border-radius:6px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;color:var(--green2);font-family:'Rajdhani',sans-serif;border:1px solid var(--border);transition:all .2s;}
.opt:hover:not(:disabled){border-color:var(--blue);background:rgba(88,166,255,.08);transform:translateX(3px);}
.opt:hover:not(:disabled) .opt-l{background:var(--blue);color:#fff;border-color:var(--blue);}
.opt.correct{border-color:var(--green)!important;background:rgba(46,160,67,.15)!important;animation:cPulse .4s;}
.opt.correct .opt-l{background:var(--green);color:#fff;border-color:var(--green);}
.opt.wrong{border-color:var(--red)!important;background:rgba(248,81,73,.15)!important;animation:wShake .4s;}
.opt.wrong .opt-l{background:var(--red);color:#fff;border-color:var(--red);}
.opt:disabled{cursor:default;}
@keyframes cPulse{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes wShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.nxt-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--purple));border:none;border-radius:11px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;}
.nxt-btn:hover{opacity:.9;transform:translateY(-2px);}

/* ── FEEDBACK ── */
.fb-ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:100;}
.fb-msg{font-size:80px;animation:fbAnim .8s forwards;opacity:0;}
@keyframes fbAnim{0%{opacity:0;transform:scale(.5) translateY(20px)}50%{opacity:1;transform:scale(1.2) translateY(-10px)}80%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.8) translateY(-30px)}}

/* ── RESULTS ── */
#resultsScreen{padding:30px 20px;}
.res-t{font-size:clamp(24px,4.5vw,38px);font-weight:900;text-align:center;margin-bottom:5px;background:linear-gradient(135deg,var(--green2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.res-s{color:var(--muted);text-align:center;margin-bottom:28px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:11px;margin-bottom:28px;width:100%;max-width:420px;}
.pod-item{flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;}
.pod-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:5px;border:3px solid transparent;}
.pod-name{font-size:11px;font-weight:700;margin-bottom:3px;}
.pod-sc{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:900;margin-bottom:5px;}
.pod-block{width:100%;border-radius:7px 7px 0 0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.rk1 .pod-av{border-color:#fbbf24;}.rk1 .pod-block{background:linear-gradient(180deg,#fbbf24,#d97706);height:90px;}.rk1 .pod-sc{color:#fbbf24;}
.rk2 .pod-av{border-color:#94a3b8;}.rk2 .pod-block{background:linear-gradient(180deg,#94a3b8,#475569);height:68px;}.rk2 .pod-sc{color:#94a3b8;}
.rk3 .pod-av{border-color:#cd7f32;}.rk3 .pod-block{background:linear-gradient(180deg,#cd7f32,#78350f);height:50px;}.rk3 .pod-sc{color:#cd7f32;}
.slist{width:100%;max-width:420px;margin-bottom:24px;}
.srow{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 14px;margin-bottom:7px;}
.sr-rk{font-family:'Rajdhani',sans-serif;font-size:19px;font-weight:900;width:24px;text-align:center;color:var(--muted);}
.sr-name{flex:1;font-weight:700;font-size:13px;}
.sr-pts{font-family:'Rajdhani',sans-serif;font-size:21px;font-weight:900;color:var(--green2);}
.again-btn{padding:11px 32px;background:linear-gradient(135deg,var(--green),#26a641);border:none;border-radius:11px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .2s;box-shadow:0 6px 20px rgba(46,160,67,.35);}
.again-btn:hover{transform:translateY(-2px);}

/* ── FLASH FAB ── */
.flash-fab{position:fixed;bottom:18px;right:18px;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--red));border:none;color:#fff;font-size:19px;cursor:pointer;z-index:200;box-shadow:0 5px 18px rgba(240,136,62,.5);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
.flash-fab:hover{transform:scale(1.1);}
.flash-ov{position:fixed;inset:0;z-index:300;background:#000;display:none;flex-direction:column;}
.flash-ov.open{display:flex;}
.flash-tb{display:flex;align-items:center;gap:9px;padding:9px 13px;background:#111;flex-shrink:0;}
.f-close{padding:6px 12px;background:var(--red);border:none;border-radius:7px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.f-clear{padding:6px 12px;background:var(--muted);border:none;border-radius:7px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;cursor:pointer;}
.f-hint{color:var(--muted);font-size:11px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.flash-body{flex:1;position:relative;}
.flash-ta{position:absolute;inset:0;width:100%;height:100%;background:transparent;border:none;outline:none;color:#fff;font-size:clamp(34px,6.5vw,80px);font-family:'Outfit',sans-serif;font-weight:900;text-align:center;resize:none;padding:36px;text-shadow:0 0 26px rgba(240,136,62,.8);caret-color:var(--orange);}

/* ── CONFETTI ── */
.cp{position:fixed;top:-20px;z-index:400;animation:cFall linear forwards;border-radius:2px;}
@keyframes cFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
.q-slide{animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ══════════════════════════════════════
   POETRY SCREEN
══════════════════════════════════════ */
.poetry-nav{width:100%;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10;}
.poetry-nav .back-btn{padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;}
.poetry-nav .back-btn:hover{border-color:var(--purple);}
.poetry-nav h2{font-size:16px;font-weight:700;color:var(--purple);}
.poetry-nav .pbar{flex:1;display:flex;gap:6px;justify-content:flex-end;overflow-x:auto;}
.poem-tab{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.poem-tab.active{border-color:var(--purple);color:var(--purple);background:rgba(188,140,255,.1);}

/* poem viewer */
.poem-section{margin-bottom:28px;}
.poem-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;margin-bottom:14px;font-family:'Rajdhani',sans-serif;}
.badge-info{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.25);}
.badge-stanza{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.25);}
.badge-figures{background:rgba(240,136,62,.15);color:var(--orange);border:1px solid rgba(240,136,62,.25);}
.badge-quiz{background:rgba(46,160,67,.15);color:var(--green2);border:1px solid rgba(46,160,67,.25);}

/* poet card */
.poet-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:20px;border-left:4px solid var(--purple);}
.poet-card h3{font-size:18px;font-weight:900;color:var(--purple);margin-bottom:4px;}
.poet-card .dates{font-family:'Rajdhani',sans-serif;color:var(--muted);font-size:13px;margin-bottom:10px;}
.poet-card p{font-size:13px;color:#b1bac4;line-height:1.7;}
.poet-facts{margin-top:10px;display:flex;flex-wrap:wrap;gap:7px;}
.fact-chip{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--muted);}

/* stanza card */
.stanza-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:16px;}
.stanza-card h4{font-size:14px;font-weight:700;color:var(--purple);margin-bottom:12px;font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.stanza-lines{font-size:15px;line-height:2.2;font-style:italic;color:#c9d1d9;padding:12px 16px;background:var(--surface);border-radius:9px;margin-bottom:14px;border-left:3px solid var(--purple);}
.stanza-line{display:block;}
.paraphrase-box{background:rgba(88,166,255,.06);border:1px solid rgba(88,166,255,.2);border-radius:9px;padding:13px;margin-bottom:12px;}
.paraphrase-box .pb-label{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:1px;font-family:'Rajdhani',sans-serif;margin-bottom:5px;}
.paraphrase-box p{font-size:13px;line-height:1.7;color:#b1bac4;}
.figures-list{display:flex;flex-direction:column;gap:8px;}
.fig-item{background:rgba(240,136,62,.06);border:1px solid rgba(240,136,62,.2);border-radius:9px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;}
.fig-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.fig-content{flex:1;}
.fig-title{font-size:12px;font-weight:700;color:var(--orange);font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-bottom:3px;}
.fig-desc{font-size:13px;color:#b1bac4;line-height:1.6;}
.fig-example{font-size:12px;font-style:italic;color:var(--muted);margin-top:3px;}

/* poetry quiz */
.pq-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;}
.pq-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.pq-title{font-size:15px;font-weight:700;color:var(--green2);}
.pq-progress{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--muted);}
.pq-qtext{font-size:14px;font-weight:600;line-height:1.7;margin-bottom:14px;padding:13px 15px;background:var(--surface);border-radius:9px;border-left:3px solid var(--green);}
.pq-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.pq-opt{padding:11px 14px;border-radius:9px;border:2px solid var(--border);background:var(--surface);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:8px;}
.pq-opt-l{width:24px;height:24px;border-radius:6px;background:var(--card);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;flex-shrink:0;color:var(--green2);font-family:'Rajdhani',sans-serif;border:1px solid var(--border);}
.pq-opt:hover:not(:disabled){border-color:var(--green);background:rgba(46,160,67,.08);}
.pq-opt.correct{border-color:var(--green)!important;background:rgba(46,160,67,.15)!important;}
.pq-opt.correct .pq-opt-l{background:var(--green);color:#fff;}
.pq-opt.wrong{border-color:var(--red)!important;background:rgba(248,81,73,.15)!important;}
.pq-opt.wrong .pq-opt-l{background:var(--red);color:#fff;}
.pq-opt:disabled{cursor:default;}
.pq-feedback{padding:10px 13px;border-radius:9px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;}
.pq-feedback.show{display:block;}
.pq-feedback.correct-fb{background:rgba(46,160,67,.15);border:1px solid rgba(46,160,67,.3);color:var(--green2);}
.pq-feedback.wrong-fb{background:rgba(248,81,73,.15);border:1px solid rgba(248,81,73,.3);color:var(--red);}
.pq-next{width:100%;padding:11px;background:linear-gradient(135deg,var(--green),#26a641);border:none;border-radius:9px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.pq-next:hover{opacity:.9;}
.pq-score-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;}
.pq-score-box .big-score{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:900;color:var(--green2);}
.pq-score-box .score-label{color:var(--muted);font-size:13px;margin-top:4px;}
.pq-restart{padding:10px 28px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.pq-restart:hover{border-color:var(--green);}

/* word reveal (tap to show meaning) */
.vocab-reveal{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
@media(max-width:480px){.vocab-reveal{grid-template-columns:1fr;}}
.vr-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;transition:all .2s;position:relative;}

<!-- ══ GAME ══ -->
<div id="gameScreen" class="screen">

    <div class="sbar" id="sBar"></div>
    <div class="q-ctr" id="qCtr">1/50</div>
    <div class="tcircle">
      <svg viewBox="0 0 44 44" width="44" height="44">
        <circle class="t-track" cx="22" cy="22" r="20"/>
        <circle class="t-prog" id="tProg" cx="22" cy="22" r="20"/>
      </svg>
      <div class="t-num" id="tNum">45</div>
    </div>
  </div>
  <div class="game-content">
    <div class="turn-wrap"><div class="turn-banner" id="turnB">🎯 Player's Turn</div></div>
    <div id="qSlide" class="q-slide">
      <div class="qtag" id="qtTag">VOCABULARY</div>
      <div class="qbox" id="qText">Loading…</div>
      <div class="opts" id="optGrid"></div>
      <button class="nxt-btn" id="nxtBtn" onclick="nextQ()" style="display:none">Next Question →</button>
    </div>
  </div>
</div>

<!-- ══ RESULTS ══ -->
<div id="resultsScreen" class="screen">
  <div class="res-t">🏆 Final Results</div>
  <div class="res-s">WELL DONE EVERYONE!</div>
  <div class="podium" id="podium"></div>
  <div class="slist" id="sList"></div>
  <button class="again-btn" onclick="playAgain()">🔄 Play Again</button>
</div>

<!-- ══ POETRY SCREEN ══ -->
<div id="poetryScreen" class="screen">

  </div>
  <div class="inner" id="poetryInner"></div>
</div>

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let players=[],qt='vocab',curQs=[],qIdx=0,pIdx=0,timer=null,tLeft=45,answered=false;
const TOTAL=45,CIRC=125.6;
const pColors=[
  {bg:'linear-gradient(135deg,#f0883e,#f85149)',tx:'#fff'},
  {bg:'linear-gradient(135deg,#58a6ff,#bc8cff)',tx:'#fff'},
  {bg:'linear-gradient(135deg,#3fb950,#26a641)',tx:'#fff'},
  {bg:'linear-gradient(135deg,#e3b341,#f0883e)',tx:'#fff'},
];
const emojis=['🥇','🥈','🥉','🎯'];
let nPlayers=1;

// ────── WELCOME ──────
function setPC(n){nPlayers=n;document.querySelectorAll('.pc-btn').forEach((b,i)=>b.classList.toggle('active',i+1===n));renderInputs();}
function renderInputs(){
  const c=document.getElementById('pCont');c.innerHTML='';
  const cls=['c0','c1','c2','c3'];
  for(let i=0;i<nPlayers;i++)c.innerHTML+=`<div class="pi-group"><div class="pi-icon ${cls[i]}">${emojis[i]}</div><input type="text" id="p${i+1}" placeholder="Player ${i+1} name"></div>`;
}
function setQt(t){qt=t;document.querySelectorAll('.qt-btn').forEach(b=>b.classList.remove('active'));document.getElementById('btn_'+t).classList.add('active');}

function startGame(){
  players=[];
  for(let i=0;i<nPlayers;i++){const v=document.getElementById('p'+(i+1))?.value.trim();players.push({name:v||'Player '+(i+1),score:0,color:pColors[i]});}
  const pool=qt==='vocab'?vocabQ:qt==='grammar'?grammarQ:dialogueQ;
  curQs=shuffle([...pool]).slice(0,50);qIdx=0;pIdx=0;
  show('gameScreen');renderBar();loadQ();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ────── GAME ──────
function renderBar(){
  document.getElementById('sBar').innerHTML=players.map((p,i)=>`
    <div class="chip ${i===pIdx?'active':''}" id="chip${i}">
      <div class="ch-av" style="background:${p.color.bg}">${emojis[i]}</div>
      <span class="ch-name">${p.name}</span>
      <span class="ch-sc" id="sc${i}">${p.score}</span>
    </div>`).join('');
}
function loadQ(){
  if(qIdx>=curQs.length){showResults();return;}
  answered=false;
  const q=curQs[qIdx],p=players[pIdx];
  document.getElementById('qCtr').textContent=`${qIdx+1}/${curQs.length}`;
  document.getElementById('turnB').innerHTML=`<span style="background:${p.color.bg};-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900">${emojis[pIdx]}</span>&nbsp;${p.name}'s Turn`;
  const tags={vocab:'📚 VOCABULARY',grammar:'📝 GRAMMAR',dialogue:'💬 DIALOGUE'};
  document.getElementById('qtTag').textContent=tags[qt];
  const qBox=document.getElementById('qText');
  if(qt==='dialogue'&&q.lines){
    qBox.className='qbox dlg';
    qBox.innerHTML=q.lines.map(l=>`<span class="dlg-line">${l.replace(/^([A-Za-z]+:)/,(m,s)=>`<span class="${/^[AB]:/.test(s)?'spa':'spb'}">${s}</span>`)}</span>`).join('');
  } else {
    qBox.className='qbox';qBox.textContent=q.q;
  }
  const letters=['A','B','C','D'];
  document.getElementById('optGrid').innerHTML=q.o.map((o,i)=>`
    <button class="opt" id="opt${i}" onclick="pick(${i})">
      <span class="opt-l">${letters[i]}</span>${o}
    </button>`).join('');
  document.getElementById('nxtBtn').style.display='none';
  const s=document.getElementById('qSlide');s.classList.remove('q-slide');void s.offsetWidth;s.classList.add('q-slide');
  renderBar();startTimer();
}
function pick(i){
  if(answered)return;answered=true;clearInterval(timer);
  const q=curQs[qIdx];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  document.getElementById('opt'+q.a).classList.add('correct');
  if(i===q.a){players[pIdx].score++;document.getElementById('sc'+pIdx).textContent=players[pIdx].score;showFb('✅');}
  else{document.getElementById('opt'+i).classList.add('wrong');showFb('❌');}
  document.getElementById('nxtBtn').style.display='block';
}
function nextQ(){qIdx++;pIdx=(pIdx+1)%players.length;loadQ();}
function startTimer(){
  tLeft=TOTAL;updateTimer();clearInterval(timer);
  timer=setInterval(()=>{tLeft--;updateTimer();
    if(tLeft<=0){clearInterval(timer);
      if(!answered){answered=true;const q=curQs[qIdx];document.querySelectorAll('.opt').forEach(b=>b.disabled=true);document.getElementById('opt'+q.a).classList.add('correct');showFb('⏰');document.getElementById('nxtBtn').style.display='block';}}
  },1000);
}
function updateTimer(){
  document.getElementById('tNum').textContent=tLeft;
  const p=document.getElementById('tProg');p.style.strokeDashoffset=CIRC-(tLeft/TOTAL)*CIRC;
  if(tLeft<=10){p.style.stroke='#f85149';document.getElementById('tNum').style.color='#f85149';}
  else if(tLeft<=20){p.style.stroke='#e3b341';document.getElementById('tNum').style.color='#e3b341';}
  else{p.style.stroke='#3fb950';document.getElementById('tNum').style.color='#e6edf3';}
}
function showFb(e){const m=document.getElementById('fbMsg');m.textContent=e;m.style.animation='none';void m.offsetWidth;m.style.animation='fbAnim .8s forwards';}

// ────── RESULTS ──────
function showResults(){
  clearInterval(timer);show('resultsScreen');confetti();
  const s=[...players].sort((a,b)=>b.score-a.score);
  document.getElementById('sList').innerHTML=s.map((p,i)=>{
    const oi=players.indexOf(p);
    return `<div class="srow"><div class="sr-rk">${i+1}</div>
      <div class="ch-av" style="background:${p.color.bg};width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${emojis[oi]}</div>
      <div class="sr-name">${p.name}</div><div class="sr-pts">${p.score} pts</div></div>`;
  }).join('');
  if(s.length>=2){
    const ord=s.length>=3?[s[1],s[0],s[2]]:[null,s[0],s[1]];
    const rks=['rk2','rk1','rk3'],hs=[68,90,50],ms=['🥈','🥇','🥉'];
    document.getElementById('podium').innerHTML=ord.map((p,i)=>{
      if(!p)return'<div class="pod-item"></div>';
      const oi=players.indexOf(p);
      return `<div class="pod-item ${rks[i]}"><div class="pod-av" style="background:${p.color.bg}">${emojis[oi]}</div>
        <div class="pod-name">${p.name}</div><div class="pod-sc">${p.score}</div>
        <div class="pod-block" style="height:${hs[i]}px">${ms[i]}</div></div>`;
    }).join('');
  } else document.getElementById('podium').style.display='none';
}
function confetti(){
  const c=['#3fb950','#58a6ff','#bc8cff','#f0883e','#e3b341','#f85149'];
  for(let i=0;i<80;i++){
    const e=document.createElement('div');e.className='cp';
    e.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;`;
    document.body.appendChild(e);setTimeout(()=>e.remove(),4000);
  }
}
function playAgain(){show('welcomeScreen');}

// ════════════════════════════════════════════════════════════
// POETRY ENGINE
// ════════════════════════════════════════════════════════════
let currentPoem=0;
let pqIndex=0,pqAnswered=false,pqScore=0,pqDone=false;

function startPoetry(){
  currentPoem=0;pqIndex=0;pqScore=0;pqDone=false;
  show('poetryScreen');
  renderPoetry();
}

function switchPoem(idx){
  currentPoem=idx;pqIndex=0;pqScore=0;pqDone=false;pqAnswered=false;
  document.querySelectorAll('.poem-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderPoetry();
}

function renderPoetry(){
  const poem=poems[currentPoem];
  const inner=document.getElementById('poetryInner');
  inner.innerHTML='';

  // ── POET INFO ──
  const pi=poem.poetInfo;
  inner.innerHTML+=`
    <div class="poem-section">
      <div class="poem-badge badge-info">📜 ABOUT THE POET</div>
      <div class="poet-card">
        <h3>${pi.name}</h3>
        <div class="dates">${pi.dates}</div>
        <p>${pi.bio}</p>
        <div class="poet-facts">${pi.facts.map(f=>`<span class="fact-chip">📌 ${f}</span>`).join('')}</div>
      </div>
      <div class="stanza-card">
        <h4>🎯 MAIN THEME</h4>
        <div class="paraphrase-box"><div class="pb-label">THEME</div><p>${poem.mainTheme}</p></div>
      </div>
    </div>`;

  // ── STANZAS ──
  inner.innerHTML+=`<div class="poem-section"><div class="poem-badge badge-stanza">🎭 STANZAS & ANALYSIS</div>`;
  poem.stanzas.forEach(st=>{
    const linesHtml=st.lines.map(l=>`<span class="stanza-line">${l}</span>`).join('');
    const figHtml=st.figures.map(f=>`
      <div class="fig-item">
        <span class="fig-icon">${f.icon}</span>
        <div class="fig-content">
          <div class="fig-title">${f.title}</div>
          <div class="fig-desc">${f.desc}</div>
          ${f.example?`<div class="fig-example">Example: ${f.example}</div>`:''}
        </div>
      </div>`).join('');
    inner.innerHTML+=`
      <div class="stanza-card">
        <h4>${st.number}</h4>
        <div class="stanza-lines">${linesHtml}</div>
        <div class="paraphrase-box"><div class="pb-label">📖 PARAPHRASE</div><p>${st.paraphrase}</p></div>
        <div class="poem-badge badge-figures">✨ FIGURES OF SPEECH</div>
        <div class="figures-list">${figHtml}</div>
      </div>`;
  });
  inner.innerHTML+=`</div>`;

  // ── VOCAB CARDS ──
  inner.innerHTML+=`
    <div class="poem-section">
      <div class="poem-badge badge-info">📚 KEY VOCABULARY — Tap to Reveal</div>
      <div class="vocab-reveal" id="vocabCards"></div>
    </div>`;

  // ── POETRY QUIZ ──
  inner.innerHTML+=`
    <div class="poem-section">
      <div class="poem-badge badge-quiz">✅ POETRY QUIZ</div>
      <div id="pqArea"></div>
    </div>`;

  // populate vocab
  const vocabData={
    0:[["solitary","alone, without anyone else"],["reaping","cutting grain in a field"],["melancholy","sad and thoughtful"],["profound","very deep"],["vale","a valley"],["chaunt","to sing"],["thrilling","exciting and emotional"],["plaintive","sounding sad"],["motionless","not moving at all"],["sickle","a curved blade for cutting crops"]],
    1:[["candlelight","the soft light of a candle"],["hopping","jumping lightly on one foot"],["grown-up","an adult person"],["clear","easy to see through / bright"],["stanza","a verse or section of a poem"],["alliteration","repetition of the same consonant sound"],["assonance","repetition of vowel sounds"],["personification","giving human qualities to non-human things"],["contrast","showing differences between two things"],["rhyme scheme","the pattern of rhymes at the end of lines"]]
  };
  const vc=vocabData[currentPoem]||[];
  document.getElementById('vocabCards').innerHTML=vc.map((v,i)=>`
    <div class="vr-card" onclick="this.classList.toggle('revealed')">
      <div class="vr-word">${v[0]}</div>
      <div class="vr-def">${v[1]}</div>
      <div class="vr-hint">Tap to see meaning</div>
    </div>`).join('');

  renderPQ();
}

function renderPQ(){
  const poem=poems[currentPoem];
  const area=document.getElementById('pqArea');
  if(!area)return;
  if(pqDone){
    area.innerHTML=`
      <div class="pq-score-box">
        <div class="big-score">${pqScore}/${poem.quizQuestions.length}</div>
        <div class="score-label">Poetry Quiz Score</div>
        <div style="margin-top:16px">${pqScore===poem.quizQuestions.length?'🏆 Perfect! Excellent work!':pqScore>=7?'⭐ Great job!':pqScore>=5?'👍 Good effort!':'📚 Keep studying the stanzas!'}</div>
      </div>
      <button class="pq-restart" onclick="pqIndex=0;pqScore=0;pqDone=false;pqAnswered=false;renderPQ()">🔄 Retry Quiz</button>`;
    return;
  }
  const q=poem.quizQuestions[pqIndex];
  const letters=['A','B','C','D'];
  area.innerHTML=`
    <div class="pq-card">
      <div class="pq-header">
        <div class="pq-title">Question ${pqIndex+1} of ${poem.quizQuestions.length}</div>
        <div class="pq-progress">Score: ${pqScore}</div>
      </div>
      <div class="pq-qtext">${q.q}</div>
      <div class="pq-opts">${q.o.map((o,i)=>`
        <button class="pq-opt" id="pqo${i}" onclick="pickPQ(${i})">
          <span class="pq-opt-l">${letters[i]}</span>${o}
        </button>`).join('')}</div>
      <div class="pq-feedback" id="pqFb"></div>
      <button class="pq-next" id="pqNext" onclick="nextPQ()" style="display:none">${pqIndex+1<poem.quizQuestions.length?'Next Question →':'See Results 🏆'}</button>
    </div>`;
}

function pickPQ(i){
  if(pqAnswered)return;pqAnswered=true;
  const q=poems[currentPoem].quizQuestions[pqIndex];
  document.querySelectorAll('.pq-opt').forEach(b=>b.disabled=true);
  document.getElementById('pqo'+q.a).classList.add('correct');
  const fb=document.getElementById('pqFb');
  if(i===q.a){
    pqScore++;
    fb.textContent='✅ Correct! Well done!';
    fb.className='pq-feedback show correct-fb';
  } else {
    document.getElementById('pqo'+i).classList.add('wrong');
    fb.textContent=`❌ Wrong. Correct answer: ${poems[currentPoem].quizQuestions[pqIndex].o[q.a]}`;
    fb.className='pq-feedback show wrong-fb';
  }
  document.getElementById('pqNext').style.display='block';
}

function nextPQ(){
  pqAnswered=false;pqIndex++;
  if(pqIndex>=poems[currentPoem].quizQuestions.length)pqDone=true;
  renderPQ();
  document.getElementById('pqArea').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function openFlash(){document.getElementById('flashOv').classList.add('open');document.getElementById('flashTA').focus();}
function closeFlash(){document.getElementById('flashOv').classList.remove('open');}
function clearFlash(){document.getElementById('flashTA').value='';}

// INIT
renderInputs();
</script>
