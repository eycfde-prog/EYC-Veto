<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الوادي الأبيض — عزالدين علي</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --parchment: #ede5d0;
    --gold: #b8902a;
    --gold-light: #d4af5a;
    --snow: #e8eef4;
    --mist: #c8d8e8;
    --accent: #2c4a6e;
    --text-muted: #6b5d4a;
    --divider: #c8b888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── حماية اضافية بالـ CSS ── */
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  /* ===== LANDING PAGE ===== */
  #landing {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .landing-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 110%, #1e3a5f 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 80%, #0d2035 0%, transparent 60%),
      linear-gradient(180deg, #080d14 0%, #0f1e30 40%, #162840 100%);
    z-index: 0;
  }

  .snow-container {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }

  .snowflake {
    position: absolute;
    top: -10px;
    color: rgba(255,255,255,0.6);
    font-size: 1em;
    animation: snowfall linear infinite;
  }

  @keyframes snowfall {
    0%   { transform: translateY(-10px) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.5; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  .mountain-svg {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    opacity: 0.7;
  }

  .landing-content {
    position: relative;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 2rem;
    text-align: center;
  }

  .badge {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.3em;
    color: var(--gold-light);
    border: 1px solid rgba(184,144,42,0.4);
    padding: 0.4rem 1.5rem;
    border-radius: 2rem;
    margin-bottom: 2.5rem;
    animation: fadeInDown 1s ease both;
  }

  .main-title {
    font-family: 'Amiri', serif;
    font-size: clamp(3.5rem, 10vw, 7rem);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    text-shadow: 0 0 80px rgba(184,144,42,0.3), 0 4px 30px rgba(0,0,0,0.8);
    animation: fadeInUp 1s ease 0.3s both;
    margin-bottom: 0.5rem;
  }

  .title-en {
    font-family: 'Tajawal', sans-serif;
    font-size: clamp(1rem, 3vw, 1.4rem);
    font-weight: 300;
    color: var(--mist);
    letter-spacing: 0.4em;
    opacity: 0.8;
    animation: fadeInUp 1s ease 0.5s both;
    margin-bottom: 2.5rem;
  }

  .divider-ornament {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin: 1.5rem 0 2.5rem;
    animation: fadeIn 1s ease 0.7s both;
  }

  .divider-ornament::before,
  .divider-ornament::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    max-width: 120px;
  }

  .diamond {
    width: 8px;
    height: 8px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .synopsis {
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    font-weight: 300;
    line-height: 2;
    color: rgba(232,238,244,0.85);
    max-width: 600px;
    animation: fadeInUp 1s ease 0.9s both;
    margin-bottom: 3rem;
  }

  .meta-row {
    display: flex;
    gap: 2.5rem;
    align-items: center;
    justify-content: center;
    margin-bottom: 3.5rem;
    animation: fadeIn 1s ease 1.1s both;
    flex-wrap: wrap;
  }

  .meta-item { text-align: center; }

  .meta-label {
    font-size: 0.75rem;
    color: var(--gold-light);
    letter-spacing: 0.2em;
    margin-bottom: 0.3rem;
    opacity: 0.8;
  }

  .meta-value {
    font-family: 'Amiri', serif;
    font-size: 1.1rem;
    color: #fff;
  }

  .meta-sep {
    width: 1px;
    height: 40px;
    background: rgba(184,144,42,0.3);
  }

  .chapters-preview {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 3.5rem;
    animation: fadeIn 1s ease 1.2s both;
  }

  .ch-pill {
    font-size: 0.78rem;
    padding: 0.35rem 1rem;
    border: 1px solid rgba(184,144,42,0.3);
    border-radius: 2rem;
    color: rgba(232,238,244,0.7);
    cursor: pointer;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.03);
  }

  .ch-pill:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(184,144,42,0.1);
  }

  .cta-btn {
    font-family: 'Amiri', serif;
    font-size: 1.2rem;
    padding: 1rem 3.5rem;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--ink);
    border: none;
    border-radius: 3rem;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.3s ease;
    box-shadow: 0 4px 30px rgba(184,144,42,0.4);
    animation: fadeInUp 1s ease 1.4s both;
    position: relative;
    overflow: hidden;
  }

  .cta-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 40px rgba(184,144,42,0.6);
  }

  /* ===== READER ===== */
  #reader {
    display: none;
    min-height: 100vh;
    background: var(--paper);
    color: var(--ink);
  }

  .progress-bar {
    position: fixed;
    top: 0; right: 0; left: 0;
    height: 3px;
    background: rgba(0,0,0,0.1);
    z-index: 100;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    width: 0%;
    transition: width 0.1s;
  }

  /* ── هيدر القارئ — مُصلَح للموبايل ── */
  .reader-header {
    position: fixed;
    top: 0; right: 0; left: 0;
    z-index: 99;
    background: rgba(245,240,232,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(184,144,42,0.2);
  }

  /* صف أول: العنوان + زر الرجوع */
  .header-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.55rem 1rem 0.3rem;
    gap: 0.5rem;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gold);
    font-family: 'Amiri', serif;
    font-size: 0.95rem;
    padding: 0.3rem 0.6rem;
    border-radius: 0.5rem;
    transition: background 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .back-btn:hover { background: rgba(184,144,42,0.1); }

  .header-title {
    font-family: 'Amiri', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    text-align: center;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* صف ثاني: أزرار التحكم في الخط والثيم */
  .header-row2 {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.2rem 1rem 0.45rem;
    border-top: 1px solid rgba(184,144,42,0.1);
  }

  .ctrl-btn {
    background: none;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 0.5rem;
    padding: 0.25rem 0.75rem;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--text-muted);
    font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
    min-width: 36px;
  }

  .ctrl-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .font-size-display {
    font-size: 0.82rem;
    color: var(--text-muted);
    min-width: 26px;
    text-align: center;
  }

  /* شريط الفصول */
  .chapter-nav {
    position: fixed;
    z-index: 98;
    right: 0; left: 0;
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.5rem 0.8rem;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(184,144,42,0.15);
    flex-wrap: wrap;
    /* top يُضبط بالـ JS بعد حساب ارتفاع الهيدر */
  }

  .ch-nav-btn {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.78rem;
    padding: 0.28rem 0.9rem;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 2rem;
    cursor: pointer;
    background: none;
    color: var(--text-muted);
    transition: all 0.25s;
    white-space: nowrap;
  }

  .ch-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
  .ch-nav-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #fff;
  }

  /* منطقة القراءة */
  .reading-area {
    /* padding-top يُضبط بالـ JS */
    padding-bottom: 6rem;
    max-width: 720px;
    margin: 0 auto;
    padding-right: 1.4rem;
    padding-left:  1.4rem;
  }

  .chapter-header {
    text-align: center;
    padding: 3rem 0 2rem;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 3rem;
  }

  .chapter-num {
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 1rem;
  }

  .chapter-title {
    font-family: 'Amiri', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.4;
    margin-bottom: 1.5rem;
  }

  .chapter-ornament {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
  }

  .chapter-ornament::before,
  .chapter-ornament::after {
    content: '';
    width: 60px;
    height: 1px;
    background: var(--divider);
  }

  .chapter-ornament-diamond {
    width: 6px;
    height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
  }

  .story-text p {
    font-family: 'Amiri', serif;
    font-size: var(--reading-font-size, 1.2rem);
    line-height: 2.1;
    color: var(--ink);
    margin-bottom: 1.6em;
    text-align: justify;
  }

  .story-text p.dialogue {
    padding-right: 1.5rem;
    border-right: 3px solid var(--gold-light);
    color: #2a1a08;
  }

  .reading-time {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 1rem;
    opacity: 0.7;
  }

  /* وضع الليل */
  body.night #reader { background: #0f0e0c; color: #d4c9b5; }
  body.night .reader-header, body.night .chapter-nav {
    background: rgba(15,14,12,0.97);
    border-color: rgba(184,144,42,0.2);
  }
  body.night .header-row2 { border-color: rgba(184,144,42,0.1); }
  body.night .header-title,
  body.night .chapter-title,
  body.night .story-text p { color: #d4c9b5; }
  body.night .ctrl-btn { color: #8a7a66; border-color: rgba(255,255,255,0.1); }
  body.night .ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
  body.night .ch-nav-btn { color: #8a7a66; border-color: rgba(255,255,255,0.1); }
  body.night .story-text p.dialogue { color: #c4b89e; }
  body.night .back-btn { color: var(--gold-light); }
  body.night .chapter-num { color: var(--gold-light); }
  body.night .nav-btn-end { color: #8a7a66; border-color: rgba(255,255,255,0.1); }
  body.night .reader-footer { color: #6a5a4a; border-color: rgba(255,255,255,0.1); }
  body.night .chapter-header { border-color: rgba(255,255,255,0.1); }

  /* وضع السيبيا */
  body.sepia #reader { background: #f4ead0; }
  body.sepia .reader-header, body.sepia .chapter-nav { background: rgba(244,234,208,0.97); }

  /* نهاية الفصل */
  .reader-footer {
    text-align: center;
    padding: 3rem 2rem;
    border-top: 1px solid var(--divider);
    color: var(--text-muted);
    font-size: 0.85rem;
  }

  .chapter-end-nav {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 2rem;
    flex-wrap: wrap;
  }

  .nav-btn-end {
    font-family: 'Amiri', serif;
    padding: 0.7rem 2rem;
    border: 1px solid var(--divider);
    border-radius: 2rem;
    cursor: pointer;
    background: none;
    color: var(--text-muted);
    font-size: 1rem;
    transition: all 0.2s;
  }

  .nav-btn-end:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(184,144,42,0.05);
  }

  .chapter-content { animation: fadeIn 0.5s ease; }

  /* scroll hint */
  .scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: rgba(255,255,255,0.3);
    font-size: 0.75rem;
    animation: bounce 2s ease infinite 2s;
  }

  .scroll-arrow {
    width: 20px; height: 20px;
    border-left: 1px solid rgba(255,255,255,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.3);
    transform: rotate(-45deg);
  }

  @keyframes fadeIn    { from{opacity:0}  to{opacity:1} }
  @keyframes fadeInDown{ from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeInUp  { from{opacity:0;transform:translateY(30px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes bounce {
    0%,100%{ transform:translateX(-50%) translateY(0); }
    50%    { transform:translateX(-50%) translateY(8px); }
  }

  @media (max-width: 600px) {
    .meta-sep  { display: none; }
    .meta-row  { gap: 1.5rem; }
  }
</style>
</head>
<body>

<!-- ===== LANDING ===== -->
<div id="landing">
  <div class="landing-bg"></div>
  <div class="snow-container" id="snowContainer"></div>

  <svg class="mountain-svg" viewBox="0 0 1440 300" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="mtnGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e8eef4" stop-opacity="0.15"/>
        <stop offset="100%" stop-color="#0f1e30" stop-opacity="0.9"/>
      </linearGradient>
    </defs>
    <polygon points="0,300 0,180 200,60 400,150 600,20 800,130 1000,40 1200,160 1440,80 1440,300" fill="url(#mtnGrad)"/>
    <polygon points="0,300 0,220 150,140 300,200 500,100 700,170 900,90 1100,180 1300,120 1440,160 1440,300" fill="rgba(8,13,20,0.6)"/>
    <polygon points="200,60 170,100 230,100" fill="rgba(232,238,244,0.4)"/>
    <polygon points="600,20 560,80 640,80"  fill="rgba(232,238,244,0.5)"/>
    <polygon points="1000,40 960,100 1040,100" fill="rgba(232,238,244,0.4)"/>
  </svg>

  <div class="landing-content">
    <div class="badge">رواية • غموض وإثارة</div>
    <h1 class="main-title">الوادي الأبيض</h1>
    <div class="title-en">THE WHITE VALLEY</div>

    <div class="divider-ornament"><div class="diamond"></div></div>

    <p class="synopsis">
      في قلب جبال لامبرث الشمالية، وراء كهفٍ يُفتح مرةً كل عام، يهوي مدرس التاريخ كلاي إلى عالمٍ من الصمت والثلج والأسرار. وادٍ يعيش فيه شعبٌ بلا عيون — لكنه يرى كل شيء.
    </p>

    <div class="meta-row">
      <div class="meta-item">
        <div class="meta-label">المؤلف</div>
        <div class="meta-value">عزالدين علي</div>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <div class="meta-label">السنة</div>
        <div class="meta-value">٢٠٢٦</div>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <div class="meta-label">الفصول</div>
        <div class="meta-value">٥ فصول</div>
      </div>
    </div>

    <div class="chapters-preview" id="landingChapters"></div>

    <button class="cta-btn" onclick="openReader(0)">ابدأ القراءة ←</button>
  </div>

  <div class="scroll-hint">
    <span>الفصول</span>
    <div class="scroll-arrow"></div>
  </div>
</div>

<!-- ===== READER ===== -->
<div id="reader">
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <!-- هيدر بصفين منفصلين -->
  <header class="reader-header" id="readerHeader">
    <div class="header-row1">
      <button class="back-btn" onclick="goBack()">← الغلاف</button>
      <div class="header-title" id="headerTitle">الوادي الأبيض</div>
      <!-- فراغ متوازن -->
      <div style="width:62px"></div>
    </div>
    <div class="header-row2">
      <button class="ctrl-btn" onclick="changeFontSize(-1)">أ−</button>
      <span class="font-size-display" id="fontSizeDisplay">19</span>
      <button class="ctrl-btn" onclick="changeFontSize(1)">أ+</button>
      <button class="ctrl-btn" id="themeBtn" onclick="cycleTheme()">🌙</button>
    </div>
  </header>

  <nav class="chapter-nav" id="chapterNav"></nav>

  <div class="reading-area" id="readingArea">
    <div id="chapterContent"></div>
  </div>
</div>

<!-- ── ضبط الـ padding-top ديناميكياً ── -->


<!-- ── ملف الرواية المشفر ── -->
<script src="script.js"></script>

<!-- ── استدعاء fixLayout بعد فتح القارئ ── -->


</body>
</html>
