<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Conquest | Grammar Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --p1-color: #00d2ff;
            --p2-color: #ff0058;
            --bg-dark: #050505;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* ========== INTRO ========== */
        #intro-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        .intro-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem; font-weight: 900;
            background: linear-gradient(90deg, var(--p1-color), var(--gold), var(--p2-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%,100% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
        }

        .intro-subtitle {
            font-size: 1.1rem; color: #666;
            letter-spacing: 6px; margin-bottom: 40px;
            text-transform: uppercase;
        }

        .players-setup {
            display: flex; gap: 50px; margin-bottom: 35px;
        }

        .player-card {
            background: rgba(255,255,255,0.03);
            border-radius: 20px; padding: 25px;
            display: flex; flex-direction: column;
            align-items: center; gap: 15px;
            width: 260px;
        }

        .p1-card { border: 1px solid rgba(0,210,255,0.4); }
        .p2-card { border: 1px solid rgba(255,0,88,0.4); }

        .card-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; letter-spacing: 3px;
        }
        .p1-card .card-label { color: var(--p1-color); }
        .p2-card .card-label { color: var(--p2-color); }

        .char-preview {
            width: 130px; height: 160px;
        }

        .char-select-btns {
            display: flex; gap: 10px; align-items: center;
        }

        .char-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 36px; height: 36px;
            border-radius: 8px; cursor: pointer;
            font-size: 1rem; transition: 0.2s;
        }
        .char-btn:hover { background: rgba(255,255,255,0.18); }

        .char-name-label {
            font-size: 0.9rem; min-width: 85px;
            text-align: center; color: #ccc;
        }

        .name-input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 10px 16px;
            border-radius: 10px; font-size: 1rem;
            font-family: 'Rajdhani', sans-serif;
            width: 100%; text-align: center; outline: none;
            transition: 0.3s;
        }
        .p1-card .name-input:focus { border-color: var(--p1-color); }
        .p2-card .name-input:focus { border-color: var(--p2-color); }

        .start-btn {
            background: linear-gradient(135deg, #0080ff, #00d2ff 40%, #ff0058);
            border: none; color: white;
            padding: 16px 55px; font-size: 1.3rem;
            font-family: 'Orbitron', sans-serif;
            border-radius: 50px; cursor: pointer;
            letter-spacing: 3px; transition: 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.06);
            box-shadow: 0 0 35px rgba(0,210,255,0.5);
        }

        /* ========== GAME SCREEN ========== */
        #game-screen {
            display: none; height: 100vh;
            flex-direction: column;
        }

        .battle-ground {
            display: flex; height: 62vh;
            border-bottom: 3px solid #1a1a1a;
            position: relative;
        }

        .territory {
            position: relative; display: flex;
            flex-direction: column; align-items: center;
            justify-content: flex-end;
            transition: flex 0.8s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden; padding-bottom: 15px;
        }

        #p1-zone {
            background: linear-gradient(160deg,#000d1a,#001f3f,#003366);
            flex: 50;
        }
        #p2-zone {
            background: linear-gradient(200deg,#1a0005,#3f0010,#660020);
            flex: 50;
        }

        /* HP Bar */
        .hp-container {
            position: absolute; top: 12px;
            left: 15px; right: 15px; z-index: 5;
        }
        .hp-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem; letter-spacing: 2px; margin-bottom: 4px;
        }
        .hp-bar-bg {
            width: 100%; height: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 5px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hp-bar-fill { height: 100%; border-radius: 5px; transition: width 0.7s ease; }
        #p1-zone .hp-bar-fill { background: linear-gradient(90deg,#00ff88,#00d2ff); }
        #p2-zone .hp-bar-fill { background: linear-gradient(90deg,#ff0058,#ff8800); }
        .hp-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem; margin-top: 3px;
        }

        /* Score */
        .score-badge {
            position: absolute; top: 12px; right: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; z-index: 5;
        }

        /* Character */
        .char-scene {
            width: 160px; height: 210px;
            position: relative; z-index: 2;
            margin-bottom: 8px;
        }

        .char-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem; letter-spacing: 3px;
            margin-bottom: 6px; z-index: 2;
        }
        #p1-zone .char-name { color: var(--p1-color); }
        #p2-zone .char-name { color: var(--p2-color); }

        .status-pill {
            padding: 4px 14px; border-radius: 20px;
            font-size: 0.8rem; font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px; z-index: 2;
        }

        /* Animations */
        @keyframes idle-bob {
            0%,100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        @keyframes shake-anim {
            0%,100% { transform: translate(0,0); }
            25% { transform: translate(-5px,3px); }
            75% { transform: translate(5px,-3px); }
        }
        @keyframes attack-anim {
            0% { transform: translateX(0) scale(1); }
            30% { transform: translateX(25px) scale(1.1); }
            60% { transform: translateX(-8px) scale(0.95); }
            100% { transform: translateX(0) scale(1); }
        }

        .idle { animation: idle-bob 2.2s ease-in-out infinite; }
        .panic { animation: shake-anim 0.12s infinite; }
        .attacking { animation: attack-anim 0.5s ease; }

        /* VS */
        .vs-divider {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            z-index: 10;
        }
        .vs-circle {
            width: 55px; height: 55px;
            background: radial-gradient(circle,#1a1a2a,#000);
            border: 2px solid #333; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem; font-weight: 900;
            color: var(--gold);
        }

        /* Damage flash */
        .damage-flash {
            position: absolute; inset: 0;
            pointer-events: none; opacity: 0;
            transition: opacity 0.08s;
            background: radial-gradient(circle,rgba(255,50,50,0.35),transparent);
            z-index: 3;
        }
        .damage-flash.active { opacity: 1; }

        /* Combo text */
        .combo-text {
            position: absolute; font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 900;
            pointer-events: none; z-index: 20;
            left: 50%; transform: translateX(-50%);
            top: 38%;
            animation: comboAnim 1s ease forwards;
        }
        @keyframes comboAnim {
            0%   { transform: translateX(-50%) scale(0.5) translateY(0); opacity: 1; }
            50%  { transform: translateX(-50%) scale(1.3) translateY(-25px); opacity: 1; }
            100% { transform: translateX(-50%) scale(1) translateY(-55px); opacity: 0; }
        }

        /* ========== UI PANEL ========== */
        .ui-panel {
            height: 38vh; background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 12px 40px; position: relative;
        }

        .round-progress {
            position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: #1a1a1a;
        }
        .round-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--p1-color), var(--p2-color));
            transition: width 0.6s ease;
        }

        .turn-banner {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px;
        }
        .turn-dot {
            width: 9px; height: 9px; border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .turn-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; letter-spacing: 3px;
        }
        .q-counter {
            margin-left: 15px; color: #444;
            font-size: 0.75rem; font-family: 'Orbitron', sans-serif;
        }

        .question-box {
            font-size: 1.7rem; margin-bottom: 15px;
            text-align: center; color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600; line-height: 1.3;
            max-width: 800px;
        }

        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 9px; width: 78%;
        }

        .opt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.12);
            color: #bbb; padding: 12px 18px;
            font-size: 1.15rem; font-family: 'Rajdhani', sans-serif;
            font-weight: 600; border-radius: 10px;
            cursor: pointer; transition: 0.2s;
            text-align: left; position: relative; overflow: hidden;
        }
        .opt-btn:hover:not(:disabled) {
            border-color: rgba(255,255,255,0.35);
            color: white; background: rgba(255,255,255,0.07);
            transform: translateX(3px);
        }
        .opt-btn .key-hint {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 0.75rem; color: #333;
            font-family: 'Orbitron', sans-serif;
        }
        .opt-btn.correct {
            background: rgba(0,255,136,0.15) !important;
            border-color: #00ff88 !important;
            color: #00ff88 !important;
        }
        .opt-btn.wrong {
            background: rgba(255,0,0,0.15) !important;
            border-color: #ff4444 !important;
            color: #ff4444 !important;
        }

        /* ========== RESULT SCREEN ========== */
        #result-screen {
            display: none; position: fixed; inset: 0;
            background: radial-gradient(ellipse at center,#050510,#000);
            flex-direction: column; align-items: center;
            justify-content: center; z-index: 200;
        }
        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem; letter-spacing: 8px;
            color: #555; margin-bottom: 8px;
        }
        .winner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem; font-weight: 900;
            margin-bottom: 15px;
            animation: winGlow 1.5s ease-in-out infinite;
        }
        @keyframes winGlow {
            0%,100% { filter: drop-shadow(0 0 15px currentColor); }
            50% { filter: drop-shadow(0 0 50px currentColor); }
        }
        .winner-char-display {
            width: 180px; height: 220px; margin: 10px;
        }
        .final-scores {
            display: flex; gap: 35px; margin: 15px;
            align-items: center;
        }
        .final-score-card {
            text-align: center; padding: 18px 28px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .fscore {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem; font-weight: 900;
        }
        .fname { font-size: 0.9rem; color: #555; margin-top: 4px; }

        .play-again-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold); padding: 13px 45px;
            font-size: 1.1rem; font-family: 'Orbitron', sans-serif;
            border-radius: 50px; cursor: pointer;
            letter-spacing: 3px; transition: 0.3s;
            margin-top: 15px;
        }
        .play-again-btn:hover { background: var(--gold); color: #000; }

        /* Particles */
        .particles {
            position: absolute; inset: 0;
            pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute; border-radius: 50%;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-300px) translateX(20px); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- ===== INTRO ===== -->
<div id="intro-screen">
    <div class="intro-title">⚔️ VETO CONQUEST</div>
    <div class="intro-subtitle">Grammar Battle Arena</div>

    <div class="players-setup">
        <div class="player-card p1-card">
            <div class="card-label">⚡ PLAYER 1</div>
            <div class="char-preview" id="p1-preview"></div>
            <div class="char-select-btns">
                <button class="char-btn" onclick="changeChar(1,-1)">◀</button>
                <span class="char-name-label" id="p1-char-label">Warrior</span>
                <button class="char-btn" onclick="changeChar(1,1)">▶</button>
            </div>
            <input class="name-input" id="p1-input" placeholder="Enter name..." maxlength="12">
        </div>

        <div class="player-card p2-card">
            <div class="card-label">🔥 PLAYER 2</div>
            <div class="char-preview" id="p2-preview"></div>
            <div class="char-select-btns">
                <button class="char-btn" onclick="changeChar(2,-1)">◀</button>
                <span class="char-name-label" id="p2-char-label">Mage</span>
                <button class="char-btn" onclick="changeChar(2,1)">▶</button>
            </div>
            <input class="name-input" id="p2-input" placeholder="Enter name..." maxlength="12">
        </div>
    </div>

    <button class="start-btn" onclick="startGame()">⚔️ START BATTLE</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen">
    <div class="battle-ground">

        <!-- P1 -->
        <div id="p1-zone" class="territory">
            <div class="particles" id="p1-particles"></div>
            <div class="damage-flash" id="p1-flash"></div>
            <div class="hp-container">
                <div class="hp-label" style="color:var(--p1-color)">❤️ HP</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="p1-hp-fill" style="width:100%"></div>
                </div>
                <div class="hp-text" id="p1-hp-text" style="color:var(--p1-color)">100 / 100</div>
            </div>
            <div class="score-badge" id="p1-score-badge" style="color:var(--p1-color)">⭐ 0</div>
            <div class="char-scene" id="p1-char-scene"></div>
            <div class="char-name" id="p1-name-display">Player 1</div>
            <div class="status-pill" id="p1-status"
                 style="background:rgba(0,210,255,0.1);border:1px solid var(--p1-color);color:var(--p1-color)">
                READY
            </div>
        </div>

        <div class="vs-divider">
            <div class="vs-circle">VS</div>
        </div>

        <!-- P2 -->
        <div id="p2-zone" class="territory">
            <div class="particles" id="p2-particles"></div>
            <div class="damage-flash" id="p2-flash"></div>
            <div class="hp-container">
                <div class="hp-label" style="color:var(--p2-color)">❤️ HP</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="p2-hp-fill" style="width:100%"></div>
                </div>
                <div class="hp-text" id="p2-hp-text" style="color:var(--p2-color)">100 / 100</div>
            </div>
            <div class="score-badge" id="p2-score-badge" style="color:var(--p2-color)">⭐ 0</div>
            <div class="char-scene" id="p2-char-scene"></div>
            <div class="char-name" id="p2-name-display">Player 2</div>
            <div class="status-pill" id="p2-status"
                 style="background:rgba(255,0,88,0.1);border:1px solid var(--p2-color);color:var(--p2-color)">
                READY
            </div>
        </div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel">
        <div class="round-progress">
            <div class="round-fill" id="round-fill" style="width:0%"></div>
        </div>
        <div class="turn-banner">
            <div class="turn-dot" id="turn-dot" style="background:var(--p1-color)"></div>
            <div class="turn-text" id="turn-txt">PLAYER 1 TURN</div>
            <div class="q-counter" id="q-counter">Q 1 / 10</div>
        </div>
        <div class="question-box" id="q-text">Loading...</div>
        <div class="options-grid">
            <button class="opt-btn" id="opt0" onclick="checkAnswer(0)"><span class="key-hint">A</span></button>
            <button class="opt-btn" id="opt1" onclick="checkAnswer(1)"><span class="key-hint">B</span></button>
            <button class="opt-btn" id="opt2" onclick="checkAnswer(2)"><span class="key-hint">C</span></button>
            <button class="opt-btn" id="opt3" onclick="checkAnswer(3)"><span class="key-hint">D</span></button>
        </div>
    </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen">
    <div class="result-title">🏆 CONQUEST COMPLETE</div>
    <div class="winner-name" id="winner-name-display"></div>
    <div class="winner-char-display" id="winner-char-display"></div>
    <div class="final-scores">
        <div class="final-score-card">
            <div class="fscore" id="fs1" style="color:var(--p1-color)">0</div>
            <div class="fname" id="fn1">Player 1</div>
        </div>
        <div style="color:#333;font-size:1.5rem">—</div>
        <div class="final-score-card">
            <div class="fscore" id="fs2" style="color:var(--p2-color)">0</div>
            <div class="fname" id="fn2">Player 2</div>
        </div>
    </div>
    <button class="play-again-btn" onclick="resetGame()">🔄 PLAY AGAIN</button>
</div>

<script>
// ============================================================
// COLOR HELPERS
// ============================================================
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
}
function lighten(hex, amt) {
    const c = hexToRgb(hex);
    return `rgb(${Math.min(255,c.r+amt)},${Math.min(255,c.g+amt)},${Math.min(255,c.b+amt)})`;
}
function darken(hex, amt) {
    const c = hexToRgb(hex);
    return `rgb(${Math.max(0,c.r-amt)},${Math.max(0,c.g-amt)},${Math.max(0,c.b-amt)})`;
}

// ============================================================
// CHARACTERS
// ============================================================
const CHARACTERS = [
    {
        name: "⚔️ Warrior",
        build: (color, flip) => {
            const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");
            svg.setAttribute("viewBox","0 0 120 200");
            svg.style.cssText = `width:100%;height:100%;${flip ? 'transform:scaleX(-1)' : ''}`;

            // Shadow
            addEl(svg,"ellipse",{cx:60,cy:196,rx:28,ry:5,fill:"rgba(0,0,0,0.4)"});

            // Boots
            addEl(svg,"rect",{x:40,y:165,width:18,height:14,rx:5,fill:"#111"});
            addEl(svg,"rect",{x:62,y:165,width:18,height:14,rx:5,fill:"#111"});

            // Legs
            addEl(svg,"rect",{x:42,y:128,width:15,height:40,rx:6,fill:darken(color,20)});
            addEl(svg,"rect",{x:63,y:128,width:15,height:40,rx:6,fill:darken(color,20)});

            // Body
            const body = addEl(svg,"rect",{x:32,y:74,width:56,height:58,rx:12,fill:color});
            // Chest plate
            addEl(svg,"rect",{x:38,y:79,width:44,height:44,rx:8,fill:darken(color,30),"fill-opacity":"0.6"});
            // Center line
            addEl(svg,"line",{x1:60,y1:79,x2:60,y2:123,stroke:lighten(color,60),"stroke-width":"1.5","stroke-opacity":"0.5"});

            // Shield (left)
            addEl(svg,"rect",{x:10,y:78,width:18,height:48,rx:7,fill:darken(color,15)});
            addEl(svg,"ellipse",{cx:12,cy:104,rx:11,ry:15,fill:darken(color,10),stroke:lighten(color,50),"stroke-width":"2"});
            addEl(svg,"ellipse",{cx:12,cy:104,rx:6,ry:9,fill:color,"fill-opacity":"0.5"});

            // Sword arm (right)
            addEl(svg,"rect",{x:90,y:78,width:18,height:48,rx:7,fill:darken(color,15)});
            // Sword
            addEl(svg,"rect",{x:106,y:52,width:5,height:62,rx:2,fill:"#d0d0d0"});
            addEl(svg,"rect",{x:98,y:108,width:22,height:6,rx:2,fill:"#8B4513"});
            const tip = addEl(svg,"polygon",{points:"108,28 104,52 112,52",fill:"#eee"});

            // Neck
            addEl(svg,"rect",{x:52,y:60,width:16,height:16,rx:6,fill:"#c8845a"});

            // Head
            addEl(svg,"ellipse",{cx:60,cy:46,rx:24,ry:26,fill:"#d4935e"});

            // Helmet
            addEl(svg,"path",{d:"M36,44 Q36,16 60,14 Q84,16 84,44 L80,44 Q80,24 60,22 Q40,24 40,44 Z",fill:darken(color,10),"fill-opacity":"0.9"});
            // Helmet crest

// SVG helper
function addEl(parent, tag, attrs) {
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
    parent.appendChild(el);
    return el;
}

// ============================================================
// QUIZ DATA
// ============================================================
const quizData = [
    { q: "She ____ to school every day.", options: ["go","goes","going","gone"], correct: 1 },
    { q: "They ____ football right now.", options: ["play","plays","are playing","played"], correct: 2 },
    { q: "____ you see the match yesterday?", options: ["Do","Does","Did","Have"], correct: 2 },
    { q: "Look! The birds ____ in the sky.", options: ["fly","is flying","are flying","flies"], correct: 2 },
    { q: "I have ____ my homework already.", options: ["finish","finishing","finished","finishes"], correct: 2 },
    { q: "If it rains, I ____ stay at home.", options: ["will","would","am","was"], correct: 0 },
    { q: "This is the ____ film I've ever seen.", options: ["good","better","best","well"], correct: 2 },
    { q: "He is ____ than his brother.", options: ["tall","taller","tallest","as tall"], correct: 1 },
    { q: "We ____ in Cairo since 2010.", options: ["live","are living","have lived","lived"], correct: 2 },
    { q: "While I ____, the phone rang.", options: ["sleep","was sleeping","slept","sleeping"], correct: 1 }
];

// ============================================================
// GAME STATE
// ============================================================
let p1CharIdx = 0, p2CharIdx = 1;
let p1Name = "Commander 1", p2Name = "Commander 2";
let currentQ = 0, currentPlayer = 1;
let p1HP = 100, p2HP = 100;
let p1Score = 0, p2Score = 0;
let locked = false;

// ============================================================
// INTRO
// ============================================================
function renderPreview(player) {
    const idx   = player === 1 ? p1CharIdx : p2CharIdx;
    const color = player === 1 ? "#00d2ff" : "#ff0058";
    const el    = document.getElementById(`p${player}-preview`);
    const lbl   = document.getElementById(`p${player}-char-label`);
    el.innerHTML = "";
    el.appendChild(CHARACTERS[idx].build(color, false));
    lbl.textContent = CHARACTERS[idx].name;
}

function changeChar(player, dir) {
    if (player === 1) p1CharIdx = (p1CharIdx + dir + CHARACTERS.length) % CHARACTERS.length;
    else              p2CharIdx = (p2CharIdx + dir + CHARACTERS.length) % CHARACTERS.length;
    renderPreview(player);
}

function startGame() {
    p1Name = document.getElementById("p1-input").value.trim() || "Commander 1";
    p2Name = document.getElementById("p2-input").value.trim() || "Commander 2";

    document.getElementById("intro-screen").style.display = "none";
    const gs = document.getElementById("game-screen");
    gs.style.display = "flex";

    document.getElementById("p1-name-display").textContent = p1Name;
    document.getElementById("p2-name-display").textContent = p2Name;

    // Place characters
    const p1Scene = document.getElementById("p1-char-scene");
    const p2Scene = document.getElementById("p2-char-scene");
    p1Scene.innerHTML = "";
    p2Scene.innerHTML = "";
    p1Scene.appendChild(CHARACTERS[p1CharIdx].build("#00d2ff", false));
    p2Scene.appendChild(CHARACTERS[p2CharIdx].build("#ff0058", true));

    p1Scene.classList.add("idle");
    p2Scene.classList.add("idle");

    createParticles("p1-particles","#00d2ff");
    createParticles("p2-particles","#ff0058");

    loadQuestion();
}

// ============================================================
// PARTICLES
// ============================================================
function createParticles(id, color) {
    const c = document.getElementById(id);
    c.innerHTML = "";
    for (let i = 0; i < 12; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.cssText = `
            left:${Math.random()*100}%;
            bottom:${Math.random()*15}%;
            width:${Math.random()*3+1}px;
            height:${Math.random()*3+1}px;
            background:${color};
            opacity:${Math.random()*0.4+0.1};
            animation-duration:${Math.random()*4+3}s;
            animation-delay:${Math.random()*3}s;
        `;
        c.appendChild(p);
    }
}

// ============================================================
// QUESTION
// ============================================================
function loadQuestion() {
    if (currentQ >= quizData.length) { endGame(); return; }
    locked = false;

    const data = quizData[currentQ];
    document.getElementById("q-text").innerHTML =
        data.q.replace("____", `<span style="color:var(--gold);border-bottom:2px solid var(--gold);padding:0 4px">____</span>`);
    document.getElementById("q-counter").textContent = `Q ${currentQ+1} / ${quizData.length}`;

    const color = currentPlayer === 1 ? "var(--p1-color)" : "var(--p2-color)";
    const name  = currentPlayer === 1 ? p1Name : p2Name;
    document.getElementById("turn-txt").textContent = `${name.toUpperCase()}'S TURN`;
    document.getElementById("turn-txt").style.color = color;
    document.getElementById("turn-dot").style.background = color;

    const keys = ["A","B","C","D"];
    for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`opt${i}`);
        btn.className = "opt-btn";
        btn.disabled = false;
        btn.innerHTML = `${data.options[i]}<span class="key-hint">${keys[i]}</span>`;
    }

    document.getElementById("round-fill").style.width = `${(currentQ/quizData.length)*100}%`;
}

// ============================================================
// ANSWER
// ============================================================
function checkAnswer(idx) {
    if (locked) return;
    locked = true;

    const isCorrect = idx === quizData[currentQ].correct;
    const defender  = currentPlayer === 1 ? 2 : 1;

    // Button feedback
    document.getElementById(`opt${idx}`).classList.add(isCorrect ? "correct" : "wrong");
    if (!isCorrect) document.getElementById(`opt${quizData[currentQ].correct}`).classList.add("correct");
    for (let i=0;i<4;i++) document.getElementById(`opt${i}`).disabled = true;

    if (isCorrect) {
        const dmg = 15 + Math.floor(Math.random()*10);
        if (defender === 1) p1HP = Math.max(0, p1HP - dmg);
        else                p2HP = Math.max(0, p2HP - dmg);

        if (currentPlayer === 1) p1Score++; else p2Score++;

        // Attack animation
        const atk = document.getElementById(`p${currentPlayer}-char-scene`);
        atk.classList.remove("idle");
        atk.classList.add("attacking");
        setTimeout(() => { atk.classList.remove("attacking"); atk.classList.add("idle"); }, 500);

        flashDamage(defender);
        showCombo(currentPlayer, "+HIT!", currentPlayer === 1 ? "#00ff88" : "#ff4466");
    } else {
        const dmg = 8;
        if (currentPlayer === 1) p1HP = Math.max(0, p1HP - dmg);
        else                     p2HP = Math.max(0, p2HP - dmg);
        flashDamage(currentPlayer);
        showCombo(currentPlayer, "MISS!", "#ff4444");
    }

    updateHP();
    updateScores();

    if (p1HP <= 0 || p2HP <= 0) { setTimeout(endGame, 1100); return; }

    currentPlayer = defender;
    currentQ++;
    setTimeout(loadQuestion, 950);
}

// ============================================================
// VISUALS
// ============================================================
function flashDamage(player) {
    const flash = document.getElementById(`p${player}-flash`);
    const scene = document.getElementById(`p${player}-char-scene`);
    flash.classList.add("active");
    scene.classList.remove("idle","attacking");
    scene.classList.add("panic");
    setTimeout(() => {
        flash.classList.remove("active");
        scene.classList.remove("panic");
        scene.classList.add("idle");
    }, 420);
}

function showCombo(player, text, color) {
    const zone = document.getElementById(`p${player}-zone`);
    const div  = document.createElement("div");
    div.className = "combo-text";
    div.style.color = color || "white";
    div.textContent = text;
    zone.appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function updateHP() {
    document.getElementById("p1-hp-fill").style.width = p1HP + "%";
    document.getElementById("p2-hp-fill").style.width = p2HP + "%";
    document.getElementById("p1-hp-text").textContent = `${p1HP} / 100`;
    document.getElementById("p2-hp-text").textContent = `${p2HP} / 100`;

    // Status pills
    const s1 = document.getElementById("p1-status");
    const s2 = document.getElementById("p2-status");

    if (p1HP <= 30) {
        s1.textContent = "⚠️ CRITICAL"; s1.style.color = "#ff4444";
        s1.style.borderColor = "#ff4444"; s1.style.background = "rgba(255,68,68,0.1)";
    } else {
        s1.textContent = "✅ STABLE"; s1.style.color = "var(--p1-color)";
        s1.style.borderColor = "var(--p1-color)"; s1.style.background = "rgba(0,210,255,0.1)";
    }

    if (p2HP <= 30) {
        s2.textContent = "⚠️ CRITICAL"; s2.style.color = "#ff4444";
        s2.style.borderColor = "#ff4444"; s2.style.background = "rgba(255,68,68,0.1)";
    } else {
        s2.textContent = "✅ STABLE"; s2.style.color = "var(--p2-color)";
        s2.style.borderColor = "var(--p2-color)"; s2.style.background = "rgba(255,0,88,0.1)";
    }

    // Territory flex
    document.getElementById("p1-zone").style.flex = p1HP;
    document.getElementById("p2-zone").style.flex = p2HP;
}

function updateScores() {
    document.getElementById("p1-score-badge").textContent = `⭐ ${p1Score}`;
    document.getElementById("p2-score-badge").textContent = `⭐ ${p2Score}`;
}

// ============================================================
// END GAME
// ============================================================
function endGame() {
    const winner = p1HP > p2HP ? 1 : p2HP > p1HP ? 2 : 0;
    const rs = document.getElementById("result-screen");
    rs.style.display = "flex";

    const wName  = winner === 1 ? p1Name : winner === 2 ? p2Name : "DRAW";
    const wColor = winner === 1 ? "var(--p1-color)" : winner === 2 ? "var(--p2-color)" : "var(--gold)";

    document.getElementById("winner-name-display").textContent =
        winner === 0 ? "🤝 IT'S A DRAW!" : `🏆 ${wName.toUpperCase()} WINS!`;
    document.getElementById("winner-name-display").style.color = wColor;

    if (winner > 0) {
        const idx   = winner === 1 ? p1CharIdx : p2CharIdx;
        const color = winner === 1 ? "#00d2ff" : "#ff0058";
        const wc    = document.getElementById("winner-char-display");
        wc.innerHTML = "";
        wc.appendChild(CHARACTERS[idx].build(color, false));
    }

    document.getElementById("fs1").textContent = p1Score;
    document.getElementById("fs2").textContent = p2Score;
    document.getElementById("fn1").textContent = p1Name;
    document.getElementById("fn2").textContent = p2Name;
}

// ============================================================
// RESET
// ============================================================
function resetGame() {
    p1HP = 100; p2HP = 100;
    p1Score = 0; p2Score = 0;
    currentQ = 0; currentPlayer = 1; locked = false;

    document.getElementById("result-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("intro-screen").style.display = "flex";

    renderPreview(1);
    renderPreview(2);
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener("keydown", e => {
    const map = {a:0, b:1, c:2, d:3};
    if (map[e.key.toLowerCase()] !== undefined) checkAnswer(map[e.key.toLowerCase()]);
});

// ============================================================
// INIT
// ============================================================
window.onload = () => { renderPreview(1); renderPreview(2); };
</script>
</body>
</html>
