<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Conquest | Character Panic</title>
    <style>
        :root {
            --p1-color: #00d2ff;
            --p2-color: #ff0058;
            --bg-dark: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Arial Black', sans-serif;
            overflow: hidden;
        }

        .battle-ground {
            display: flex;
            height: 70vh;
            width: 100%;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .territory {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: flex 0.6s ease-in-out;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }

        #p1-zone { background: linear-gradient(to bottom, #001a2c, #004e7a); flex: 50; }
        #p2-zone { background: linear-gradient(to bottom, #2c000b, #7a001e); flex: 50; }

        /* Character Container */
        .char-wrapper {
            width: 250px;
            height: 250px;
            transition: transform 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Panic Animation */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(3px, 1px) rotate(1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .panic { animation: shake 0.2s infinite; }

        /* UI Panel */
        .ui-panel {
            height: 30vh;
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
            border-top: 5px solid #444;
        }

        .controls {
            display: flex;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .p1-btn { background: var(--p1-color); color: #000; }
        .p2-btn { background: var(--p2-color); color: #fff; }
        .btn:active { transform: scale(0.9); }

        .status-text { font-size: 2rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="battle-ground">
        <div id="p1-zone" class="territory">
            <div class="status-text">Commander 1</div>
            <div class="char-wrapper" id="p1-char-wrap">
                <svg viewBox="0 0 100 100" id="p1-svg" width="100%" height="100%">
                    <path id="p1-body" d="M20,80 Q50,10 80,80 T20,80" fill="var(--p1-color)" />
                    <g id="p1-eyes">
                        <circle cx="40" cy="55" r="5" fill="white" />
                        <circle cx="60" cy="55" r="5" fill="white" />
                    </g>
                </svg>
            </div>
            <div id="p1-label" style="font-size: 1.5rem;">SECURE</div>
        </div>

        <div id="p2-zone" class="territory">
            <div class="status-text">Commander 2</div>
            <div class="char-wrapper" id="p2-char-wrap">
                <svg viewBox="0 0 100 100" id="p2-svg" width="100%" height="100%">
                    <path id="p2-body" d="M20,80 Q50,10 80,80 T20,80" fill="var(--p2-color)" />
                    <g id="p2-eyes">
                        <circle cx="40" cy="55" r="5" fill="white" />
                        <circle cx="60" cy="55" r="5" fill="white" />
                    </g>
                </svg>
            </div>
            <div id="p2-label" style="font-size: 1.5rem;">SECURE</div>
        </div>
    </div>

    <div class="ui-panel">
        <div id="game-msg" style="font-size: 1.5rem;">CONQUEST IN PROGRESS...</div>
        <div class="controls">
            <button class="btn p1-btn" onclick="updateWar(10)">P1 CONQUEST</button>
            <button class="btn p2-btn" onclick="updateWar(-10)">P2 CONQUEST</button>
        </div>
    </div>

<script>
    let p1Flex = 50;

    function updateWar(amount) {
        p1Flex += amount;
        
        // Limits
        if (p1Flex > 85) p1Flex = 85;
        if (p1Flex < 15) p1Flex = 15;

        render();
    }

    function render() {
        const p1Zone = document.getElementById('p1-zone');
        const p2Zone = document.getElementById('p2-zone');
        const p1Wrap = document.getElementById('p1-char-wrap');
        const p2Wrap = document.getElementById('p2-char-wrap');

        p1Zone.style.flex = p1Flex;
        p2Zone.style.flex = (100 - p1Flex);

        // Logic for Player 1 Stress
        if (p1Flex <= 30) {
            applyStress(p1Wrap, 'p1-eyes', 'p1-label', "PANIC!");
        } else {
            removeStress(p1Wrap, 'p1-eyes', 'p1-label', "SECURE");
            p1Wrap.style.transform = `scale(${p1Flex/50})`; // Grow if winning
        }

        // Logic for Player 2 Stress
        if (p1Flex >= 70) {
            applyStress(p2Wrap, 'p2-eyes', 'p2-label', "PANIC!");
        } else {
            removeStress(p2Wrap, 'p2-eyes', 'p2-label', "SECURE");
            p2Wrap.style.transform = `scale(${(100-p1Flex)/50})`; // Grow if winning
        }
    }

    function applyStress(wrapper, eyeId, labelId, text) {
        wrapper.classList.add('panic');
        wrapper.style.transform = "scaleX(0.6) scaleY(1.3)"; // Squash effect
        document.getElementById(eyeId).innerHTML = `
            <path d="M35,50 L45,60 M45,50 L35,60" stroke="white" stroke-width="3"/>
            <path d="M55,50 L65,60 M65,50 L55,60" stroke="white" stroke-width="3"/>`;
        document.getElementById(labelId).innerText = text;
        document.getElementById(labelId).style.color = "yellow";
    }

    function removeStress(wrapper, eyeId, labelId, text) {
        wrapper.classList.remove('panic');
        document.getElementById(eyeId).innerHTML = `
            <circle cx="40" cy="55" r="5" fill="white" />
            <circle cx="60" cy="55" r="5" fill="white" />`;
        document.getElementById(labelId).innerText = text;
        document.getElementById(labelId).style.color = "white";
    }
</script>
</body>
</html>
