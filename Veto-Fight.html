<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veto Conquest | Grammar Battle</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        :root {
            --p1-color: #00d2ff;
            --p2-color: #ff0058;
            --bg-dark: #050505;
            --gold: #ffd700;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%; width: 100%;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
        }

        /* ========== INTRO SCREEN ========== */
        #intro-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        .intro-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem; font-weight: 900;
            background: linear-gradient(90deg, var(--p1-color), var(--gold), var(--p2-color));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: none;
            margin-bottom: 10px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%,100% { filter: brightness(1); }
            50% { filter: brightness(1.4); }
        }

        .intro-subtitle {
            font-size: 1.3rem; color: #888;
            letter-spacing: 6px; margin-bottom: 50px;
            text-transform: uppercase;
        }

        .players-setup {
            display: flex; gap: 60px; margin-bottom: 40px;
        }

        .player-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 30px;
            display: flex; flex-direction: column;
            align-items: center; gap: 20px;
            width: 280px;
        }

        .player-card.p1-card { border-color: rgba(0,210,255,0.3); }
        .player-card.p2-card { border-color: rgba(255,0,88,0.3); }

        .card-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem; letter-spacing: 3px;
        }

        .p1-card .card-label { color: var(--p1-color); }
        .p2-card .card-label { color: var(--p2-color); }

        .char-preview {
            width: 120px; height: 120px;
            position: relative;
        }

        .char-select-btns {
            display: flex; gap: 10px;
        }

        .char-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 40px; height: 40px;
            border-radius: 8px; cursor: pointer;
            font-size: 1.1rem; transition: 0.2s;
        }

        .char-btn:hover { background: rgba(255,255,255,0.15); }

        .name-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 12px 20px;
            border-radius: 10px; font-size: 1.1rem;
            font-family: 'Rajdhani', sans-serif;
            width: 100%; text-align: center;
            outline: none; transition: 0.3s;
        }

        .p1-card .name-input:focus { border-color: var(--p1-color); box-shadow: 0 0 15px rgba(0,210,255,0.3); }
        .p2-card .name-input:focus { border-color: var(--p2-color); box-shadow: 0 0 15px rgba(255,0,88,0.3); }

        .start-btn {
            background: linear-gradient(135deg, var(--p1-color), #0080ff, var(--p2-color));
            border: none; color: white;
            padding: 18px 60px; font-size: 1.4rem;
            font-family: 'Orbitron', sans-serif;
            border-radius: 50px; cursor: pointer;
            letter-spacing: 3px; transition: 0.3s;
            position: relative; overflow: hidden;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0,210,255,0.5);
        }

        /* ========== GAME SCREEN ========== */
        #game-screen { display: none; height: 100vh; flex-direction: column; }

        /* Battle Ground */
        .battle-ground {
            display: flex; height: 62vh;
            border-bottom: 3px solid #1a1a1a;
            position: relative;
        }

        .territory {
            position: relative; display: flex;
            flex-direction: column; align-items: center;
            justify-content: flex-end;
            transition: flex 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; padding-bottom: 20px;
        }

        #p1-zone {
            background: linear-gradient(160deg, #000d1a 0%, #001f3f 50%, #003366 100%);
            flex: 50;
        }

        #p2-zone {
            background: linear-gradient(200deg, #1a0005 0%, #3f0010 50%, #660020 100%);
            flex: 50;
        }

        /* Ground effect */
        .territory::before {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 80px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        /* Particle effects */
        .particles {
            position: absolute; inset: 0;
            pointer-events: none; overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px; height: 3px;
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100%) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100%) translateX(30px); opacity: 0; }
        }

        /* HP Bar */
        .hp-container {
            position: absolute; top: 15px;
            left: 20px; right: 20px;
        }

        .hp-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .hp-bar-bg {
            width: 100%; height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hp-bar-fill {
            height: 100%; border-radius: 6px;
            transition: width 0.8s ease;
        }

        #p1-zone .hp-bar-fill { background: linear-gradient(90deg, #00ff88, #00d2ff); }
        #p2-zone .hp-bar-fill { background: linear-gradient(90deg, #ff0058, #ff8800); }

        .hp-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; margin-top: 4px;
        }

        /* Score Badge */
        .score-badge {
            position: absolute; top: 15px; right: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px; padding: 5px 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
        }

        /* 3D Character */
        .char-scene {
            width: 200px; height: 260px;
            position: relative;
            margin-bottom: 10px;
            z-index: 2;
        }

        /* Character name */
        .char-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem; letter-spacing: 3px;
            margin-bottom: 8px; z-index: 2;
        }

        #p1-zone .char-name { color: var(--p1-color); }
        #p2-zone .char-name { color: var(--p2-color); }

        /* Status pill */
        .status-pill {
            padding: 5px 18px;
            border-radius: 20px; font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px; z-index: 2;
        }

        /* ======= 3D CHARACTER SVGs ======= */

        /* WARRIOR Character */
        .warrior-char {
            width: 100%; height: 100%;
        }

        /* MAGE Character */
        .mage-char {
            width: 100%; height: 100%;
        }

        /* Animations */
        @keyframes idle-bob {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes shake {
            0%,100% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(-4px,2px) rotate(-2deg); }
            75% { transform: translate(4px,-2px) rotate(2deg); }
        }

        @keyframes attack-slash {
            0% { transform: translateX(0) rotate(0); }
            30% { transform: translateX(30px) rotate(15deg) scale(1.1); }
            60% { transform: translateX(-10px) rotate(-5deg); }
            100% { transform: translateX(0) rotate(0); }
        }

        @keyframes death-fall {
            0% { transform: rotate(0) translateY(0); opacity: 1; }
            100% { transform: rotate(90deg) translateY(50px); opacity: 0.3; }
        }

        .idle { animation: idle-bob 2s ease-in-out infinite; }
        .panic { animation: shake 0.1s infinite; }
        .attacking { animation: attack-slash 0.5s ease; }
        .defeated { animation: death-fall 1s ease forwards; }

        /* VS Divider */
        .vs-divider {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex; flex-direction: column;
            align-items: center;
        }

        .vs-circle {
            width: 60px; height: 60px;
            background: radial-gradient(circle, #1a1a1a, #000);
            border: 2px solid #333;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem; font-weight: 900;
            color: var(--gold);
        }

        /* ========== UI PANEL ========== */
        .ui-panel {
            height: 38vh; background: #0a0a0a;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 15px 40px; position: relative;
        }

        /* Progress bar */
        .round-progress {
            position: absolute; top: 0; left: 0; right: 0;
            height: 3px; background: #1a1a1a;
        }

        .round-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--p1-color), var(--p2-color));
            transition: width 0.6s ease;
        }

        /* Turn indicator */
        .turn-banner {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 12px;
        }

        .turn-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        .turn-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem; letter-spacing: 3px;
        }

        /* Question */
        .question-box {
            font-size: 1.8rem; margin-bottom: 18px;
            text-align: center; color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600; line-height: 1.3;
            max-width: 800px;
        }

        .question-box span.blank {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
            padding: 0 5px;
        }

        /* Options */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; width: 80%;
        }

        .opt-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.12);
            color: #bbb; padding: 14px 20px;
            font-size: 1.2rem; font-family: 'Rajdhani', sans-serif;
            font-weight: 600; border-radius: 10px;
            cursor: pointer; transition: 0.2s;
            text-align: left; position: relative;
            overflow: hidden;
        }

        .opt-btn:hover {
            border-color: rgba(255,255,255,0.4);
            color: white;
            background: rgba(255,255,255,0.07);
            transform: translateX(3px);
        }

        .opt-btn .key-hint {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%);
            font-size: 0.8rem; color: #444;
            font-family: 'Orbitron', sans-serif;
        }

        .opt-btn.correct {
            background: rgba(0,255,136,0.15) !important;
            border-color: #00ff88 !important;
            color: #00ff88 !important;
        }

        .opt-btn.wrong {
            background: rgba(255,0,0,0.15) !important;
            border-color: #ff4444 !important;
            color: #ff4444 !important;
        }

        /* ========== RESULT SCREEN ========== */
        #result-screen {
            display: none; position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #050510 0%, #000 100%);
            flex-direction: column; align-items: center;
            justify-content: center; z-index: 200;
        }

        .result-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem; letter-spacing: 8px;
            color: #555; margin-bottom: 10px;
            text-transform: uppercase;
        }

        .winner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem; font-weight: 900;
            animation: winnerGlow 1.5s ease-in-out infinite;
            margin-bottom: 20px;
        }

        @keyframes winnerGlow {
            0%,100% { filter: drop-shadow(0 0 20px currentColor); }
            50% { filter: drop-shadow(0 0 60px currentColor); }
        }

        .winner-char-display {
            width: 200px; height: 250px; margin: 20px;
        }

        .final-scores {
            display: flex; gap: 40px; margin: 20px;
        }

        .final-score-card {
            text-align: center; padding: 20px 30px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .final-score-card .fscore {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem; font-weight: 900;
        }

        .final-score-card .fname {
            font-size: 1rem; color: #666; margin-top: 5px;
        }

        .play-again-btn {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold); padding: 15px 50px;
            font-size: 1.2rem; font-family: 'Orbitron', sans-serif;
            border-radius: 50px; cursor: pointer;
            letter-spacing: 3px; transition: 0.3s;
            margin-top: 20px;
        }

        .play-again-btn:hover {
            background: var(--gold); color: #000;
        }

        /* ========== DAMAGE FLASH ========== */
        .damage-flash {
            position: absolute; inset: 0;
            pointer-events: none; opacity: 0;
            transition: opacity 0.1s;
        }

        .damage-flash.active { opacity: 1; }

        /* ========== COMBO TEXT ========== */
        .combo-text {
            position: absolute; font-family: 'Orbitron', sans-serif;
            font-size: 2rem; font-weight: 900;
            pointer-events: none; z-index: 20;
            animation: comboAnim 1s ease forwards;
        }

        @keyframes comboAnim {
            0% { transform: scale(0.5) translateY(0); opacity: 1; }
            50% { transform: scale(1.3) translateY(-30px); opacity: 1; }
            100% { transform: scale(1) translateY(-60px); opacity: 0; }
        }

    </style>
</head>
<body>

<!-- ===== INTRO SCREEN ===== -->
<div id="intro-screen">
    <div class="intro-title">⚔️ VETO CONQUEST</div>
    <div class="intro-subtitle">Grammar Battle Arena</div>

    <div class="players-setup">
        <!-- Player 1 -->
        <div class="player-card p1-card">
            <div class="card-label">⚡ PLAYER 1</div>
            <div class="char-preview" id="p1-preview"></div>
            <div class="char-select-btns">
                <button class="char-btn" onclick="changeChar(1,-1)">◀</button>
                <span id="p1-char-name" style="font-size:0.9rem;align-self:center;min-width:80px;text-align:center"></span>
                <button class="char-btn" onclick="changeChar(1,1)">▶</button>
            </div>
            <input class="name-input" id="p1-input" placeholder="Enter name..." maxlength="12">
        </div>

        <!-- Player 2 -->
        <div class="player-card p2-card">
            <div class="card-label">🔥 PLAYER 2</div>
            <div class="char-preview" id="p2-preview"></div>
            <div class="char-select-btns">
                <button class="char-btn" onclick="changeChar(2,-1)">◀</button>
                <span id="p2-char-name" style="font-size:0.9rem;align-self:center;min-width:80px;text-align:center"></span>
                <button class="char-btn" onclick="changeChar(2,1)">▶</button>
            </div>
            <input class="name-input" id="p2-input" placeholder="Enter name..." maxlength="12">
        </div>
    </div>

    <button class="start-btn" onclick="startGame()">⚔️ START BATTLE</button>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen">
    <div class="battle-ground" id="war-map">

        <!-- P1 Zone -->
        <div id="p1-zone" class="territory">
            <div class="particles" id="p1-particles"></div>
            <div class="damage-flash" id="p1-flash" style="background:radial-gradient(circle,rgba(255,0,0,0.3),transparent)"></div>

            <div class="hp-container">
                <div class="hp-label" style="color:var(--p1-color)">HP</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="p1-hp-fill" style="width:100%"></div>
                </div>
                <div class="hp-text" id="p1-hp-text" style="color:var(--p1-color)">100 / 100</div>
            </div>

            <div class="score-badge" id="p1-score-badge" style="color:var(--p1-color)">0</div>

            <div class="char-scene idle" id="p1-char-scene"></div>
            <div class="char-name" id="p1-name-display">Commander 1</div>
            <div class="status-pill" id="p1-status" style="background:rgba(0,210,255,0.1);border:1px solid var(--p1-color);color:var(--p1-color)">READY</div>
        </div>

        <!-- VS -->
        <div class="vs-divider">
            <div class="vs-circle">VS</div>
        </div>

        <!-- P2 Zone -->
        <div id="p2-zone" class="territory">
            <div class="particles" id="p2-particles"></div>
            <div class="damage-flash" id="p2-flash" style="background:radial-gradient(circle,rgba(255,0,0,0.3),transparent)"></div>

            <div class="hp-container">
                <div class="hp-label" style="color:var(--p2-color)">HP</div>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="p2-hp-fill" style="width:100%"></div>
                </div>
                <div class="hp-text" id="p2-hp-text" style="color:var(--p2-color)">100 / 100</div>
            </div>

            <div class="score-badge" id="p2-score-badge" style="color:var(--p2-color)">0</div>

            <div class="char-scene idle" id="p2-char-scene"></div>
            <div class="char-name" id="p2-name-display">Commander 2</div>
            <div class="status-pill" id="p2-status" style="background:rgba(255,0,88,0.1);border:1px solid var(--p2-color);color:var(--p2-color)">READY</div>
        </div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel">
        <div class="round-progress">
            <div class="round-fill" id="round-fill" style="width:0%"></div>
        </div>

        <div class="turn-banner">
            <div class="turn-dot" id="turn-dot"></div>
            <div class="turn-text" id="turn-txt">PLAYER 1 TURN</div>
            <div style="margin-left:20px;color:#444;font-size:0.8rem;font-family:'Orbitron',sans-serif" id="q-counter">Q 1/10</div>
        </div>

        <div class="question-box" id="q-text">Loading...</div>

        <div class="options-grid">
            <button class="opt-btn" onclick="checkAnswer(0)" id="opt0"><span class="key-hint">A</span></button>
            <button class="opt-btn" onclick="checkAnswer(1)" id="opt1"><span class="key-hint">B</span></button>
            <button class="opt-btn" onclick="checkAnswer(2)" id="opt2"><span class="key-hint">C</span></button>
            <button class="opt-btn" onclick="checkAnswer(3)" id="opt3"><span class="key-hint">D</span></button>
        </div>
    </div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="result-screen">
    <div class="result-title">🏆 CONQUEST COMPLETE</div>
    <div class="winner-name" id="winner-name-display">PLAYER 1 WINS!</div>
    <div class="winner-char-display" id="winner-char-display"></div>
    <div class="final-scores">
        <div class="final-score-card">
            <div class="fscore" id="fs1" style="color:var(--p1-color)">0</div>
            <div class="fname" id="fn1">Player 1</div>
        </div>
        <div style="display:flex;align-items:center;color:#444;font-size:2rem">—</div>
        <div class="final-score-card">
            <div class="fscore" id="fs2" style="color:var(--p2-color)">0</div>
            <div class="fname" id="fn2">Player 2</div>
        </div>
    </div>
    <button class="play-again-btn" onclick="resetGame()">🔄 PLAY AGAIN</button>
</div>

<script>
// ============================================================
//  CHARACTER DEFINITIONS  (3D-style SVG)
// ============================================================
const CHARACTERS = [
    {
        name: "Warrior",
        emoji: "⚔️",
        getSVG: (color, flipped) => `
        <svg viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;${flipped?'transform:scaleX(-1)':''}">
          <defs>
            <radialGradient id="wbody${flipped?'2':''}" cx="40%" cy="30%" r="60%">
              <stop offset="0%" stop-color="${lighten(color,60)}"/>
              <stop offset="100%" stop-color="${color}"/>
            </radialGradient>
            <radialGradient id="wface${flipped?'2':''}" cx="40%" cy="35%" r="55%">
              <stop offset="0%" stop-color="#ffe0c0"/>
              <stop offset="100%" stop-color="#c8845a"/>
            </radialGradient>
            <filter id="wshadow${flipped?'2'.''}">
              <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="${color}" flood-opacity="0.5"/>
            </filter>
          </defs>

          <!-- Shadow on ground -->
          <ellipse cx="60" cy="195" rx="30" ry="6" fill="rgba(0,0,0,0.4)"/>

          <!-- Legs -->
          <rect x="42" y="130" width="16" height="45" rx="6" fill="url(#wbody${flipped?'2':''})" filter="url(#wshadow${flipped?'2':''})"/>
          <rect x="62" y="130" width="16" height="45" rx="6" fill="url(#wbody${flipped?'2':''})" filter="url(#wshadow${flipped?'2':''})"/>
          <!-- Boots -->
          <rect x="40" y="163" width="20" height="14" rx="5" fill="#1a0a00"/>
          <rect x="60" y="163" width="20" height="14" rx="5" fill="#1a0a00"/>

          <!-- Body / Armor -->
          <rect x="32" y="75" width="56" height="60" rx="12" fill="url(#wbody${flipped?'2':''})" filter="url(#wshadow${flipped?'2':''})"/>
          <!-- Chest plate -->
          <rect x="38" y="80" width="44" height="45" rx="8" fill="${darken(color,30)}" opacity="0.6"/>

// ============================================================
//  COLOR HELPERS
// ============================================================
function lighten(hex, amount) {
    const num = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, (num >> 16) + amount);
    const g = Math.min(255, ((num >> 8) & 0xff) + amount);
    const b = Math.min(255, (num & 0xff) + amount);
    return `#${((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1)}`;
}

function darken(hex, amount) {
    const num = parseInt(hex.replace('#',''), 16);
    const r = Math.max(0, (num >> 16) - amount);
    const g = Math.max(0, ((num >> 8) & 0xff) - amount);
    const b = Math.max(0, (num & 0xff) - amount);
    return `#${((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1)}`;
}

// ============================================================
//  GAME STATE
// ============================================================
let p1CharIdx = 0, p2CharIdx = 1;
let p1Name = 'Commander 1', p2Name = 'Commander 2';
let currentQ = 0, currentPlayer = 1;
let p1HP = 100, p2HP = 100;
let p1Score = 0, p2Score = 0;
let locked = false;

// ============================================================
//  INTRO FUNCTIONS
// ============================================================
function changeChar(player, dir) {
    if (player === 1) {
        p1CharIdx = (p1CharIdx + dir + CHARACTERS.length) % CHARACTERS.length;
        renderPreview(1);
    } else {
        p2CharIdx = (p2CharIdx + dir + CHARACTERS.length) % CHARACTERS.length;
        renderPreview(2);
    }
}

function renderPreview(player) {
    const idx = player === 1 ? p1CharIdx : p2CharIdx;
    const color = player === 1 ? '#00d2ff' : '#ff0058';
    const el = document.getElementById(`p${player}-preview`);
    const nameEl = document.getElementById(`p${player}-char-name`);
    el.innerHTML = CHARACTERS[idx].getSVG(color, player === 2);
    nameEl.textContent = CHARACTERS[idx].emoji + ' ' + CHARACTERS[idx].name;
}

function startGame() {
    p1Name = document.getElementById('p1-input').value.trim() || 'Commander 1';
    p2Name = document.getElementById('p2-input').value.trim() || 'Commander 2';

    document.getElementById('intro-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';

    document.getElementById('p1-name-display').textContent = p1Name;
    document.getElementById('p2-name-display').textContent = p2Name;

    // Render characters
    document.getElementById('p1-char-scene').innerHTML =
        CHARACTERS[p1CharIdx].getSVG('#00d2ff', false);
    document.getElementById('p2-char-scene').innerHTML =
        CHARACTERS[p2CharIdx].getSVG('#ff0058', true);

    // Particles
    createParticles('p1-particles', '#00d2ff');
    createParticles('p2-particles', '#ff0058');

    loadQuestion();
}

// ============================================================
//  PARTICLES
// ============================================================
function createParticles(containerId, color) {
    const container = document.getElementById(containerId);
    for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.cssText = `
            left: ${Math.random()*100}%;
            bottom: ${Math.random()*20}%;
            background: ${color};
            opacity: ${Math.random()*0.5+0.1};
            animation-duration: ${Math.random()*4+3}s;
            animation-delay: ${Math.random()*3}s;
            width: ${Math.random()*4+1}px;
            height: ${Math.random()*4+1}px;
        `;
        container.appendChild(p);
    }
}

// ============================================================
//  QUESTION LOADER
// ============================================================
function loadQuestion() {
    if (currentQ >= quizData.length) { endGame(); return; }

    locked = false;
    const data = quizData[currentQ];
    const displayQ = data.q.replace('____', '<span class="blank">____</span>');
    document.getElementById('q-text').innerHTML = displayQ;
    document.getElementById('q-counter').textContent = `Q ${currentQ+1}/${quizData.length}`;

    const color = currentPlayer === 1 ? 'var(--p1-color)' : 'var(--p2-color)';
    const name = currentPlayer === 1 ? p1Name : p2Name;
    document.getElementById('turn-txt').textContent = `${name.toUpperCase()}'S TURN`;
    document.getElementById('turn-txt').style.color = color;
    document.getElementById('turn-dot').style.background = color;

    const keys = ['A', 'B', 'C', 'D'];
    for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`opt${i}`);
        btn.className = 'opt-btn';
        btn.innerHTML = data.options[i] + `<span class="key-hint">${keys[i]}</span>`;
        btn.disabled = false;
    }

    document.getElementById('round-fill').style.width = `${(currentQ/quizData.length)*100}%`;
}

// ============================================================
//  ANSWER CHECK
// ============================================================
function checkAnswer(idx) {
    if (locked) return;
    locked = true;

    const isCorrect = (idx === quizData[currentQ].correct);
    const attacker = currentPlayer;
    const defender = currentPlayer === 1 ? 2 : 1;

    // Visual feedback on buttons
    document.getElementById(`opt${idx}`).classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) {
        document.getElementById(`opt${quizData[currentQ].correct}`).classList.add('correct');
    }

    // Disable all buttons
    for (let i = 0; i < 4; i++) document.getElementById(`opt${i}`).disabled = true;

    if (isCorrect) {
        // Deal damage
        const dmg = 15 + Math.floor(Math.random()*10);
        if (defender === 1) p1HP = Math.max(0, p1HP - dmg);
        else p2HP = Math.max(0, p2HP - dmg);

        if (attacker === 1) p1Score++;
        else p2Score++;

        // Attack animation
        const atkScene = document.getElementById(`p${attacker}-char-scene`);
        atkScene.classList.remove('idle');
        atkScene.classList.add('attacking');
        setTimeout(() => { atkScene.classList.remove('attacking'); atkScene.classList.add('idle'); }, 500);

        // Damage flash on defender
        flashDamage(defender);
        showCombo(attacker, '+HIT');
    } else {
        // Self damage
        const dmg = 8;
        if (attacker === 1) p1HP = Math.max(0, p1HP - dmg);
        else p2HP = Math.max(0, p2HP - dmg);
        flashDamage(attacker);
        showCombo(attacker, 'MISS!');
    }

    updateHP();
    updateScores();

    // Check for KO
    if (p1HP <= 0 || p2HP <= 0) {
        setTimeout(endGame, 1200);
        return;
    }

    currentPlayer = defender;
    currentQ++;
    setTimeout(loadQuestion, 900);
}

// ============================================================
//  VISUALS
// ============================================================
function flashDamage(player) {
    const flash = document.getElementById(`p${player}-flash`);
    flash.classList.add('active');
    // Panic
    const scene = document.getElementById(`p${player}-char-scene`);
    scene.classList.remove('idle');
    scene.classList.add('panic');
    setTimeout(() => {
        flash.classList.remove('active');
        scene.classList.remove('panic');
        scene.classList.add('idle');
    }, 400);
}

function showCombo(player, text) {
    const zone = document.getElementById(`p${player}-zone`);
    const div = document.createElement('div');
    div.className = 'combo-text';
    div.style.color = player === 1 ? 'var(--p1-color)' : 'var(--p2-color)';
    div.style.left = '50%';
    div.style.top = '40%';
    div.style.transform = 'translateX(-50%)';
    div.textContent = text;
    zone.appendChild(div);
    setTimeout(() => div.remove(), 1000);
}

function updateHP() {
    document.getElementById('p1-hp-fill').style.width = p1HP + '%';
    document.getElementById('p2-hp-fill').style.width = p2HP + '%';
    document.getElementById('p1-hp-text').textContent = `${p1HP} / 100`;
    document.getElementById('p2-hp-text').textContent = `${p2HP} / 100`;

    const s1 = document.getElementById('p1-status');
    const s2 = document.getElementById('p2-status');

    if (p1HP <= 30) {
        s1.textContent = '⚠️ CRITICAL'; s1.style.color = '#ff4444';
        document.getElementById('p1-char-scene').classList.remove('idle');
        document.getElementById('p1-char-scene').classList.add('panic');
    } else { s1.textContent = '✅ STABLE'; s1.style.color = 'var(--p1-color)'; }

    if (p2HP <= 30) {
        s2.textContent = '⚠️ CRITICAL'; s2.style.color = '#ff4444';
        document.getElementById('p2-char-scene').classList.remove('idle');
        document.getElementById('p2-char-scene').classList.add('panic');
    } else { s2.textContent = '✅ STABLE'; s2.style.color = 'var(--p2-color)'; }

    // Flex territory
    const p1Flex = p1HP;
    const p2Flex = p2HP;
    document.getElementById('p1-zone').style.flex = p1Flex;
    document.getElementById('p2-zone').style.flex = p2Flex;
}

function updateScores() {
    document.getElementById('p1-score-badge').textContent = `⭐ ${p1Score}`;
    document.getElementById('p2-score-badge').textContent = `⭐ ${p2Score}`;
}

// ============================================================
//  END GAME
// ============================================================
function endGame() {
    const winner = p1HP > p2HP ? 1 : (p2HP > p1HP ? 2 : 0);
    const rs = document.getElementById('result-screen');
    rs.style.display = 'flex';

    const wName = winner === 1 ? p1Name : winner === 2 ? p2Name : 'DRAW!';
    const wColor = winner === 1 ? 'var(--p1-color)' : winner === 2 ? 'var(--p2-color)' : 'var(--gold)';

    document.getElementById('winner-name-display').textContent =
        winner === 0 ? '🤝 IT\'S A DRAW!' : `🏆 ${wName.toUpperCase()} WINS!`;
    document.getElementById('winner-name-display').style.color = wColor;

    // Winner char
    if (winner > 0) {
        const idx = winner === 1 ? p1CharIdx : p2CharIdx;
        const color = winner === 1 ? '#00d2ff' : '#ff0058';
        document.getElementById('winner-char-display').innerHTML =
            CHARACTERS[idx].getSVG(color, false);
    }

    document.getElementById('fs1').textContent = p1Score;
    document.getElementById('fs2').textContent = p2Score;
    document.getElementById('fn1').textContent = p1Name;
    document.getElementById('fn2').textContent = p2Name;
}

function resetGame() {
    p1HP = 100; p2HP = 100;
    p1Score = 0; p2Score = 0;
    currentQ = 0; currentPlayer = 1;
    locked = false;

    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('intro-screen').style.display = 'flex';

    renderPreview(1);
    renderPreview(2);
}

// ============================================================
//  KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
    const map = { 'a': 0, 'b': 1, 'c': 2, 'd': 3 };
    if (map[e.key.toLowerCase()] !== undefined) {
        checkAnswer(map[e.key.toLowerCase()]);
    }
});

// ============================================================
//  INIT
// ============================================================
window.onload = () => {
    renderPreview(1);
    renderPreview(2);
};
</script>
</body>
</html>
