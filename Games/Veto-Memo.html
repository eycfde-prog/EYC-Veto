<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veto Program - Mobile Optimized</title>
    <style>
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            min-height: 100vh; 
            margin: 0; 
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .header { 
            text-align: center; 
            padding: 15px 10px;
            width: 100%;
            box-sizing: border-box;
        }
        #levelText { 
            color: #00f2ff; 
            text-shadow: 0 0 10px #00f2ff;
            margin: 5px 0;
            font-size: 1.4rem;
        }
        #game-container { 
            position: relative; 
            width: 95%; 
            max-width: 800px;
            display: flex;
            justify-content: center;
        }
        canvas { 
            border: 2px solid #00f2ff; 
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); 
            border-radius: 10px; 
            background: #000;
            cursor: pointer;
            width: 100%; /* يجعل الكانفس يتمدد حسب الحاوية */
            height: auto;
            touch-action: none; /* يمنع التمرير أثناء اللعب */
        }
        #overlay { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 10; 
            border-radius: 10px; 
        }
        button { 
            background: #00f2ff; 
            color: #000; 
            border: none; 
            padding: 10px 25px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 15px;
        }
        .fail-text { color: #ff0055; }
        .stats-bar { font-size: 0.9rem; color: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="levelText">Group 1 - Level 1</h2>
        <div class="stats-bar">Limit: 50 Moves | Current: <span id="moveDisplay" style="color: #fff; font-weight: bold;">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="overlay">
            <h1 id="statusTitle">Stage Clear!</h1>
            <p id="scoreDetail" style="font-size: 1.2rem;"></p>
            <button id="actionBtn" onclick="handleAction()">Next Level</button>
        </div>
    </div>

    <script>
        const VetoVocab = {
            setA: [
                ["Eat", "Drink", "Sleep", "Go", "Come", "Run", "Walk", "Play", "Read", "Write"],
                ["Speak", "Listen", "Look", "See", "Watch", "Open", "Close", "Sit", "Stand", "Jump"],
                ["Swim", "Drive", "Ride", "Give", "Take", "Buy", "Sell", "Help", "Work", "Study"],
                ["Learn", "Teach", "Cook", "Clean", "Wash", "Cut", "Draw", "Paint", "Sing", "Dance"],
                ["Smile", "Laugh", "Cry", "Think", "Know", "Make", "Use", "Push", "Pull", "Stop"]
            ],
            setB: [
                ["Hear", "Touch", "Smell", "Taste", "Feel", "Remember", "Forget", "Believe", "Hope", "Want"],
                ["Need", "Love", "Like", "Hate", "Wait", "Meet", "Ask", "Answer", "Tell", "Say"],
                ["Call", "Send", "Receive", "Bring", "Carry", "Hold", "Catch", "Throw", "Win", "Lose"],
                ["Start", "Finish", "Try", "Change", "Fix", "Break", "Build", "Spend", "Save", "Borrow"],
                ["Lend", "Pay", "Cost", "Choose", "Decide", "Explain", "Travel", "Fly", "Stay", "Leave"]
            ]
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let currentSet = 'setA';
        let currentLevel = 0;
        let moves = 0;
        let matches = 0;
        let cards = [];
        let flipped = [];
        let isLock = false;

        // إعدادات ديناميكية للموبايل
        let cardW, cardH, gap, startX, startY;

        function setupSizing() {
            // ضبط دقة الكانفس الداخلية لتناسب العرض الحقيقي للشاشة
            const containerWidth = document.getElementById('game-container').clientWidth;
            canvas.width = containerWidth;
            canvas.height = containerWidth * 0.8; // نسبة ارتفاع متزنة للموبايل

            gap = canvas.width * 0.02; // مسافة 2% بين الكروت
            cardW = (canvas.width - (6 * gap)) / 5;
            cardH = (canvas.height - (5 * gap)) / 4;
            
            startX = gap;
            startY = gap;
        }

        function init() {
            setupSizing();
            moves = 0;
            matches = 0;
            flipped = [];
            isLock = false;
            document.getElementById('moveDisplay').innerText = moves;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('levelText').innerText = `${currentSet === 'setA' ? 'Group 1' : 'Group 2'} - Level ${currentLevel + 1}`;

            let words = VetoVocab[currentSet][currentLevel];
            let deck = [...words, ...words].sort(() => Math.random() - 0.5);

            cards = [];
            for(let i=0; i<20; i++) {
                cards.push({
                    word: deck[i],
                    x: startX + (i % 5) * (cardW + gap),
                    y: startY + Math.floor(i / 5) * (cardH + gap),
                    isFlipped: false,
                    isMatched: false
                });
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            cards.forEach(card => {
                ctx.save();
                ctx.beginPath();
                ctx.roundRect(card.x, card.y, cardW, cardH, 8);
                
                if (card.isFlipped || card.isMatched) {
                    ctx.fillStyle = "#111";
                    ctx.strokeStyle = card.isMatched ? "#00ff00" : "#00f2ff";
                    ctx.lineWidth = 2;
                    ctx.fill();
                    ctx.stroke();

                    ctx.fillStyle = "#fff";
                    // ضبط حجم الخط ديناميكياً بناءً على حجم الكرت
                    let fontSize = Math.floor(cardW * 0.22);
                    ctx.font = `bold ${fontSize}px 'Segoe UI'`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText(card.word, card.x + cardW/2, card.y + cardH/2);
                } else {
                    ctx.fillStyle = "#1a1a1a";
                    ctx.strokeStyle = "#00f2ff";
                    ctx.lineWidth = 1;
                    ctx.fill();
                    ctx.stroke();
                    
                    ctx.fillStyle = "#333";
                    ctx.font = `${Math.floor(cardH * 0.5)}px Arial`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.fillText("?", card.x + cardW/2, card.y + cardH/2);
                }
                ctx.restore();
            });
        }

        // دعم اللمس (Touch) والضغط (Click)
        const handleInput = (e) => {
            if (isLock) return;
            e.preventDefault();
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const mx = (clientX - rect.left) * (canvas.width / rect.width);
            const my = (clientY - rect.top) * (canvas.height / rect.height);

            cards.forEach(card => {
                if (!card.isFlipped && !card.isMatched && 
                    mx > card.x && mx < card.x + cardW && 
                    my > card.y && my < card.y + cardH) {
                    
                    card.isFlipped = true;
                    flipped.push(card);
                    draw();

                    if (flipped.length === 2) {
                        moves++;
                        document.getElementById('moveDisplay').innerText = moves;
                        checkMatch();
                    }
                }
            });
        };

        canvas.addEventListener('mousedown', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        function checkMatch() {
            isLock = true;
            if (flipped[0].word === flipped[1].word) {
                flipped[0].isMatched = true;
                flipped[1].isMatched = true;
                matches++;
                flipped = [];
                isLock = false;
                if (matches === 10) setTimeout(() => finish(true), 500);
            } else {
                if (moves >= 50) {
                    setTimeout(() => finish(false), 500);
                    return;
                }
                setTimeout(() => {
                    flipped[0].isFlipped = false;
                    flipped[1].isFlipped = false;
                    flipped = [];
                    isLock = false;
                    draw();
                }, 800);
            }
            draw();
        }

        function finish(success) {
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('statusTitle');
            const detail = document.getElementById('scoreDetail');
            const btn = document.getElementById('actionBtn');
            overlay.style.display = 'flex';

            if (success) {
                let score = Math.max(0, 100 - (Math.max(0, moves - 20) * 5));
                title.innerText = "Great Job!";
                title.className = "";
                detail.innerText = `Moves: ${moves} | Score: ${score}`;
                btn.innerText = "Next Level";
            } else {
                title.innerText = "Failed!";
                title.className = "fail-text";
                detail.innerText = "Limit reached. Try again!";
                btn.innerText = "Retry Level";
            }
        }

        function handleAction() {
            if (document.getElementById('actionBtn').innerText === "Retry Level") {
                init();
            } else {
                currentLevel++;
                if (currentLevel > 4) {
                    currentLevel = 0;
                    currentSet = (currentSet === 'setA') ? 'setB' : 'setA';
                }
                init();
            }
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
