<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veto Speed Matcher - MobiCheck Optimized</title>
    <style>
        :root {
            --neon-gold: #ffd700;
            --neon-red: #ff0055;
            --neon-green: #00ff00;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            touch-action: none; /* منع أي حركة للمتصفح أثناء اللعب */
        }

        .header {
            padding: 20px 10px;
            text-align: center;
            z-index: 20;
        }

        h1 { font-size: 1.2rem; margin: 0; color: #fff; }
        #scoreBoard { color: var(--neon-gold); font-size: 1rem; margin-top: 5px; }

        /* منطقة اللعبة الرئيسية - متجاوبة */
        #game-container {
            position: relative;
            width: 90vw;
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        #target-word {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #fff;
            z-index: 10;
            text-transform: uppercase;
            text-align: center;
            width: 120px;
        }

        .image-slot {
            position: absolute;
            width: 65px; /* حجم أصغر للموبايل */
            height: 65px;
            background: #111;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            -webkit-tap-highlight-color: transparent;
        }

        .image-slot:active { transform: scale(0.9); border-color: var(--neon-gold); }

        #timer-svg {
            position: absolute;
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
            z-index: 5;
        }

        #timer-circle {
            fill: none;
            stroke: var(--neon-gold);
            stroke-width: 6;
            stroke-dasharray: 440; /* 2 * pi * 70 */
            stroke-dashoffset: 0;
        }

        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        button {
            background: var(--neon-gold);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        /* Animations */
        .correct-flash { animation: correctFlash 0.3s ease; }
        .wrong-flash { animation: wrongFlash 0.3s ease; }

        @keyframes correctFlash {
            50% { background: var(--neon-green); box-shadow: 0 0 30px var(--neon-green); }
        }
        @keyframes wrongFlash {
            50% { background: var(--neon-red); box-shadow: 0 0 30px var(--neon-red); }
        }

        @media (min-width: 600px) {
            .image-slot { width: 80px; height: 80px; font-size: 3rem; }
            #target-word { font-size: 2rem; }
            #timer-svg { width: 200px; height: 200px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Speed Matcher</h1>
        <p id="scoreBoard">Score: 0 | Round: <span id="roundDisplay">1</span>/10</p>
    </div>

    <div id="game-container">
        <svg id="timer-svg" viewBox="0 0 160 160">
            <circle id="timer-circle" cx="80" cy="80" r="70"></circle>
        </svg>
        <div id="target-word">READY?</div>
    </div>

    <div id="overlay">
        <h1 id="statusTitle" style="font-size: 2.5rem;">GAME OVER</h1>
        <p id="finalScore" style="font-size: 1.2rem; margin-bottom: 20px;"></p>
        <button onclick="startGame()">TRY AGAIN</button>
    </div>

    <script>
        const items = [
            { word: "Apple", img: "🍎" }, { word: "Car", img: "🚗" },
            { word: "Dog", img: "🐶" }, { word: "Book", img: "📚" },
            { word: "Sun", img: "☀️" }, { word: "Pizza", img: "🍕" },
            { word: "Clock", img: "⌚" }, { word: "Ball", img: "⚽" },
            { word: "Tree", img: "🌳" }, { word: "House", img: "🏠" }
        ];

        let currentRound = 0, score = 0, timer, correctItem, canClick = false;

        const container = document.getElementById('game-container');
        const wordDisplay = document.getElementById('target-word');
        const circle = document.getElementById('timer-circle');

        function createSlots() {
            document.querySelectorAll('.image-slot').forEach(el => el.remove());
            
            // حساب نصف القطر بناءً على حجم الكانفس المتاح (متجاوب)
            const rect = container.getBoundingClientRect();
            const radius = rect.width / 2.6; 
            
            items.forEach((item, i) => {
                const angle = (i / 10) * (Math.PI * 2);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const slot = document.createElement('div');
                slot.className = 'image-slot';
                slot.innerText = item.img;
                slot.dataset.word = item.word;
                
                // التموضع بالنسبة لمركز الحاوية
                slot.style.left = `calc(50% + ${x}px - 32.5px)`;
                slot.style.top = `calc(50% + ${y}px - 32.5px)`;
                
                slot.addEventListener('touchstart', (e) => { e.preventDefault(); handleChoice(slot); });
                slot.addEventListener('mousedown', () => handleChoice(slot));
                container.appendChild(slot);
            });
        }

        function startGame() {
            currentRound = 0; score = 0;
            document.getElementById('overlay').style.display = 'none';
            updateStats();
            createSlots();
            setTimeout(nextRound, 500);
        }

        function nextRound() {
            if (currentRound >= 10) { endGame(true); return; }
            canClick = true;
            updateStats();
            wordDisplay.style.color = "#fff";
            correctItem = items[Math.floor(Math.random() * items.length)];
            wordDisplay.innerText = correctItem.word;
            startTimer();
        }

        function startTimer() {
            circle.style.transition = 'none';
            circle.style.strokeDashoffset = '0';
            
            setTimeout(() => {
                circle.style.transition = 'stroke-dashoffset 2s linear';
                circle.style.strokeDashoffset = '440';
            }, 50);

            clearTimeout(timer);
            timer = setTimeout(() => { if (canClick) handleChoice(null); }, 2000);
        }

        function handleChoice(clickedSlot) {
            if (!canClick) return;
            canClick = false;
            clearTimeout(timer);

            if (clickedSlot && clickedSlot.dataset.word === correctItem.word) {
                score += 10;
                clickedSlot.classList.add('correct-flash');
                setTimeout(() => {
                    clickedSlot.classList.remove('correct-flash');
                    currentRound++;
                    nextRound();
                }, 400);
            } else {
                if(clickedSlot) clickedSlot.classList.add('wrong-flash');
                wordDisplay.innerText = "WRONG!";
                wordDisplay.style.color = "#ff0055";
                
                // تمييز الإجابة الصحيحة للمساعدة في التعلم
                const correctSlot = document.querySelector(`[data-word="${correctItem.word}"]`);
                correctSlot.style.borderColor = "#00ff00";
                
                setTimeout(() => endGame(false), 1200);
            }
        }

        function updateStats() {
            document.getElementById('scoreBoard').innerHTML = `Score: ${score} | Round: ${currentRound + 1}/10`;
        }

        function endGame(win) {
            const overlay = document.getElementById('overlay');
            overlay.style.display = 'flex';
            document.getElementById('statusTitle').innerText = win ? "PERFECT!" : "GAME OVER";
            document.getElementById('statusTitle').style.color = win ? "#00ff00" : "#ff0055";
            document.getElementById('finalScore').innerText = `Final Score: ${score}/100`;
        }

        window.addEventListener('resize', createSlots);
        startGame();
    </script>
</body>
</html>
