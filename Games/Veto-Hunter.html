<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veto Speed Matcher - Mobile</title>
    <style>
        :root {
            --neon-gold: #ffd700;
            --neon-red: #ff0055;
            --neon-blue: #00f2ff;
        }

        body {
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            touch-action: none;
        }

        .header {
            padding-top: 20px;
            text-align: center;
            z-index: 20;
        }
        
        h1 { font-size: 1.2rem; margin: 0; }
        #scoreBoard { color: var(--neon-gold); font-size: 1rem; margin-top: 5px; }

        /* منطقة اللعبة الرئيسية - متجاوبة */
        #game-area {
            position: relative;
            flex: 1;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* الكلمة المستهدفة */
        #target-word {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            z-index: 10;
            text-transform: uppercase;
            max-width: 120px;
            pointer-events: none;
        }

        /* الكروت */
        .image-slot {
            position: absolute;
            width: 75px;
            height: 75px;
            background: #111;
            border: 2px solid #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
            -webkit-tap-highlight-color: transparent;
        }

        /* شريط الوقت */
        #timer-svg {
            position: absolute;
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
            z-index: 5;
        }
        
        #timer-circle {
            fill: none;
            stroke: var(--neon-gold);
            stroke-width: 6;
            stroke-dasharray: 440; /* 2 * pi * 70 */
            stroke-dashoffset: 0;
        }

        /* تأثيرات الفلاش */
        .correct-flash { animation: correctFlash 0.3s forwards; }
        .wrong-flash { animation: wrongFlash 0.3s forwards; }

        @keyframes correctFlash {
            50% { background: #00ff00; box-shadow: 0 0 30px #00ff00; }
        }
        @keyframes wrongFlash {
            50% { background: var(--neon-red); box-shadow: 0 0 30px var(--neon-red); }
        }

        /* شاشة النهاية */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        button {
            background: var(--neon-gold);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Speed Matcher</h1>
        <p id="scoreBoard">Score: 0 | Round: <span id="roundDisplay">1</span>/10</p>
    </div>

    <div id="game-area">
        <svg id="timer-svg">
            <circle id="timer-circle" cx="80" cy="80" r="70"></circle>
        </svg>
        <div id="target-word">START</div>
    </div>

    <div id="overlay">
        <h1 id="statusTitle" style="font-size: 2.5rem;">GAME OVER</h1>
        <p id="finalScore" style="font-size: 1.2rem;"></p>
        <button onclick="startGame()">PLAY AGAIN</button>
    </div>

    <script>
        const items = [
            { word: "Apple", img: "🍎" }, { word: "Car", img: "🚗" },
            { word: "Dog", img: "🐶" }, { word: "Book", img: "📚" },
            { word: "Sun", img: "☀️" }, { word: "Pizza", img: "🍕" },
            { word: "Clock", img: "⌚" }, { word: "Ball", img: "⚽" },
            { word: "Tree", img: "🌳" }, { word: "House", img: "🏠" }
        ];

        let currentRound = 0, score = 0, timer, correctItem, canClick = false;

        function setupBoard() {
            document.querySelectorAll('.image-slot').forEach(el => el.remove());
            const area = document.getElementById('game-area');
            
            // حساب القطر ديناميكياً بناءً على أصغر بُعد في الشاشة
            const minDim = Math.min(window.innerWidth, window.innerHeight);
            const radius = (minDim / 2) - 60; 
            
            items.forEach((item, i) => {
                const angle = (i / items.length) * (Math.PI * 2) - (Math.PI / 2);
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                const slot = document.createElement('div');
                slot.className = 'image-slot';
                slot.innerText = item.img;
                slot.dataset.word = item.word;
                slot.style.transform = `translate(${x}px, ${y}px)`;
                
                // أحداث اللمس للسرعة
                slot.addEventListener('touchstart', (e) => { e.preventDefault(); handleChoice(slot); });
                slot.onclick = () => handleChoice(slot);
                area.appendChild(slot);
            });
        }

        function startGame() {
            currentRound = 0; score = 0;
            document.getElementById('overlay').style.display = 'none';
            setupBoard();
            nextRound();
        }

        function nextRound() {
            if (currentRound >= 10) return endGame(true);
            canClick = true;
            document.getElementById('roundDisplay').innerText = currentRound + 1;
            document.getElementById('target-word').style.color = "#fff";
            
            correctItem = items[Math.floor(Math.random() * items.length)];
            document.getElementById('target-word').innerText = correctItem.word;

            startTimer();
        }

        function startTimer() {
            const circle = document.getElementById('timer-circle');
            circle.style.transition = 'none';
            circle.style.strokeDashoffset = '0';
            
            setTimeout(() => {
                circle.style.transition = 'stroke-dashoffset 2s linear';
                circle.style.strokeDashoffset = '440';
            }, 50);

            clearTimeout(timer);
            timer = setTimeout(() => { if (canClick) handleChoice(null); }, 2000);
        }

        function handleChoice(clickedSlot) {
            if (!canClick) return;
            canClick = false;
            clearTimeout(timer);

            if (clickedSlot && clickedSlot.dataset.word === correctItem.word) {
                score += 10;
                document.getElementById('scoreBoard').innerHTML = `Score: ${score} | Round: ${currentRound+1}/10`;
                clickedSlot.classList.add('correct-flash');
                setTimeout(() => {
                    clickedSlot.classList.remove('correct-flash');
                    currentRound++;
                    nextRound();
                }, 400);
            } else {
                if(clickedSlot) clickedSlot.classList.add('wrong-flash');
                document.getElementById('target-word').innerText = "WRONG!";
                document.getElementById('target-word').style.color = "#ff0055";
                
                // تمييز الإجابة الصحيحة
                const correct = document.querySelector(`[data-word="${correctItem.word}"]`);
                correct.style.borderColor = "#00ff00";
                correct.style.boxShadow = "0 0 20px #00ff00";

                setTimeout(() => endGame(false), 1000);
            }
        }

        function endGame(win) {
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('statusTitle').innerText = win ? "WELL DONE!" : "GAME OVER";
            document.getElementById('statusTitle').style.color = win ? "#00ff00" : "#ff0055";
            document.getElementById('finalScore').innerText = `Final Score: ${score}`;
        }

        window.addEventListener('resize', setupBoard);
        startGame();
    </script>
</body>
</html>
