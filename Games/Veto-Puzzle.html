<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Veto Sentence Builder - MobiCheck Optimized</title>
    <style>
        :root {
            --neon-gold: #ffd700;
            --neon-blue: #00f2ff;
        }
        
        body {
            background: #050505;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        .header { 
            text-align: center; 
            margin-bottom: 15px;
            width: 100%;
        }
        
        #levelIndicator { 
            color: var(--neon-gold); 
            text-shadow: 0 0 8px var(--neon-gold); 
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { font-size: 1.5rem; margin: 10px 0; }
        p { font-size: 0.9rem; color: #ccc; margin-bottom: 10px; }

        /* منطقة بناء الجملة - محسنة للموبايل */
        #sentence-zone {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            min-height: 100px;
            border: 2px dashed #444;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.03);
            box-sizing: border-box;
        }

        /* منطقة اختيار الكلمات */
        #words-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            width: 100%;
            max-width: 600px;
            padding: 10px;
            box-sizing: border-box;
        }

        /* ستايل الكلمات - تكبير أهداف اللمس */
        .word-tile {
            background: #111;
            border: 2px solid var(--neon-gold);
            color: #fff;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            transition: transform 0.1s, box-shadow 0.2s;
            user-select: none;
            touch-action: manipulation;
        }

        .word-tile:active {
            transform: scale(0.92);
            background: #333;
        }

        .word-tile.selected {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        #message {
            height: 30px;
            margin: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            width: 100%;
            justify-content: center;
        }

        button {
            background: #222;
            color: #fff;
            border: 1px solid #444;
            padding: 12px 20px;
            font-size: 0.9rem;
            border-radius: 8px;
            flex: 1;
            max-width: 150px;
            font-weight: bold;
        }

        #nextBtn {
            background: var(--neon-gold);
            color: #000;
            border: none;
            display: none;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .win-glow { 
            border-style: solid !important;
            border-color: #00ff00 !important; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2) !important; 
        }

        /* لضمان رؤية العناصر في الموبايلات القصيرة */
        @media (max-height: 600px) {
            h1 { font-size: 1.2rem; margin: 5px; }
            #sentence-zone { min-height: 80px; margin-bottom: 10px; }
            .word-tile { padding: 8px 12px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="levelIndicator">Level 1 / 10</div>
        <h1>Sentence Builder</h1>
        <p>Tap words to build the sentence!</p>
    </div>

    <div id="sentence-zone"></div>
    <div id="words-pool"></div>
    <div id="message"></div>

    <div class="controls">
        <button onclick="resetCurrent()">Reset</button>
        <button id="nextBtn" onclick="nextLevel()">Next Level</button>
    </div>

    <script>
        const sentences = [
            ["I", "love", "to", "study", "English"],
            ["The", "sun", "is", "very", "bright"],
            ["We", "play", "football", "every", "day"],
            ["She", "can", "speak", "five", "languages"],
            ["My", "friend", "has", "a", "car"],
            ["It", "is", "time", "to", "eat"],
            ["You", "are", "a", "smart", "student"],
            ["Books", "help", "us", "to", "learn"],
            ["Water", "is", "good", "for", "health"],
            ["They", "work", "hard", "every", "week"]
        ];

        let currentLevel = 0;
        const sentenceZone = document.getElementById('sentence-zone');
        const wordsPool = document.getElementById('words-pool');
        const nextBtn = document.getElementById('nextBtn');
        const message = document.getElementById('message');

        function initLevel() {
            sentenceZone.innerHTML = '';
            wordsPool.innerHTML = '';
            message.innerText = '';
            nextBtn.style.display = 'none';
            sentenceZone.classList.remove('win-glow');
            document.getElementById('levelIndicator').innerText = `Level ${currentLevel + 1} / ${sentences.length}`;

            let original = sentences[currentLevel];
            let shuffled = [...original].sort(() => Math.random() - 0.5);

            shuffled.forEach((word) => {
                const tile = document.createElement('div');
                tile.className = 'word-tile';
                tile.innerText = word;
                // استخدام TouchStart لتسريع الاستجابة على الجوال
                tile.onclick = (e) => selectWord(tile);
                wordsPool.appendChild(tile);
            });
        }

        function selectWord(tile) {
            const word = tile.innerText;
            tile.style.visibility = 'hidden'; // استخدام visibility للحفاظ على مكان العناصر في الشبكة
            tile.style.pointerEvents = 'none';
            
            const newTile = document.createElement('div');
            newTile.className = 'word-tile selected';
            newTile.innerText = word;
            
            newTile.onclick = () => {
                newTile.remove();
                tile.style.visibility = 'visible';
                tile.style.pointerEvents = 'auto';
                checkStatus();
            };

            sentenceZone.appendChild(newTile);
            checkStatus();
        }

        function checkStatus() {
            const currentOrder = Array.from(sentenceZone.querySelectorAll('.word-tile'))
                                     .map(t => t.innerText);
            const correctOrder = sentences[currentLevel];

            if (currentOrder.length === correctOrder.length) {
                if (JSON.stringify(currentOrder) === JSON.stringify(correctOrder)) {
                    message.innerText = "Correct! 🌟";
                    message.style.color = "#00ff00";
                    sentenceZone.classList.add('win-glow');
                    nextBtn.style.display = 'block';
                    Array.from(sentenceZone.querySelectorAll('.word-tile')).forEach(t => t.onclick = null);
                } else {
                    message.innerText = "Try again! ❌";
                    message.style.color = "#ff0055";
                }
            } else {
                message.innerText = "";
            }
        }

        function resetCurrent() {
            initLevel();
        }

        function nextLevel() {
            currentLevel++;
            if (currentLevel < sentences.length) {
                initLevel();
            } else {
                message.innerText = "Game Completed! 🏆";
                nextBtn.innerText = "Restart";
                currentLevel = -1;
                nextBtn.style.display = 'block';
            }
        }

        initLevel();
    </script>
</body>
</html>
